# Unit-test gate for Portal 5.
#
# Runs the pytest unit suite on every PR and on push to main.
# Unlike persona_matrix_nightly.yml, this workflow does NOT need a
# self-hosted runner — unit tests are pure-Python and import-only.

name: unit-tests

on:
  pull_request:
    paths:
      - "portal/**"
      - "portal_pipeline/**"
      - "portal_mcp/**"
      - "portal_channels/**"
      - "tests/unit/**"
      - "tests/lib/**"
      - "tests/uat/**"
      - "tests/persona_matrix/**"
      - "config/**.yaml"
      - "config/**.md"
      - "pyproject.toml"
      - ".github/workflows/unit-tests.yml"
      - ".pre-commit-config.yaml"
  push:
    branches: [main]

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit portal/modules/security/tests -n auto -x --tb=short -v

      - name: Upload coverage on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: .pytest_cache/
          retention-days: 7
