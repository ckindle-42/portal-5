# Portal 5.2.1 — Complete Stack
# Usage: ./launch.sh up  (from repo root — NEVER run docker compose directly)
# Secrets are auto-generated by launch.sh on first run.
# Running docker compose up directly without a .env will fail with missing vars.

services:

  # ── Ollama — Local LLM inference (opt-in, native is default) ─────────────
  ollama:
    image: ollama/ollama:latest
    pull_policy: always
    container_name: portal5-ollama
    restart: unless-stopped
    profiles:
      - docker-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}     # 4 concurrent LLM requests
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}  # Keep 2 models in VRAM
      - OLLAMA_MAX_QUEUE=${OLLAMA_MAX_QUEUE:-25}           # Queue up to 25 requests
    # P7: Memory limits prevent runaway model loads from crashing other services.
    # OLLAMA_MEMORY_LIMIT defaults to 0 (unlimited) since model sizes vary.
    # Set OLLAMA_MEMORY_LIMIT=48g in .env to cap VRAM/RAM at 48 GB.
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY_LIMIT:-0}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      start_period: 30s
      retries: 10

  # ── Ollama Init — pulls models on first run (opt-in, native is default) ───
  ollama-init:
    image: ollama/ollama:latest
    container_name: portal5-ollama-init
    restart: "no"
    profiles:
      - docker-ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-models:/root/.ollama
    command: >
      sh -c "
        echo '=== Portal 5: Pulling core models ===' &&
        ollama pull ${DEFAULT_MODEL:-dolphin-llama3:8b} &&
        ollama pull hf.co/QuantFactory/Llama-3.2-3B-Instruct-abliterated-GGUF &&
        ollama pull nomic-embed-text:latest &&
        echo '=== Core models ready ===' &&
        echo 'Run: ./launch.sh pull-models  to pull all specialized models'
      "

  # ── Portal Pipeline — Intelligent Router ─────────────────────────────────
  portal-pipeline:
    build:
      context: ../..
      dockerfile: Dockerfile.pipeline
    container_name: portal5-pipeline
    restart: unless-stopped
    ports:
      - "0.0.0.0:9099:9099"
    volumes:
      - ../../config/backends.yaml:/app/config/backends.yaml:ro
      - type: tmpfs
        target: /tmp/portal_metrics
        tmpfs:
          size: 10485760
      - pipeline-metrics-state:/app/data
    environment:
      - PIPELINE_API_KEY=${PIPELINE_API_KEY}
      - PIPELINE_WORKERS=${PIPELINE_WORKERS:-2}
      - PIPELINE_PORT=9099
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-20}
      - PROMETHEUS_MULTIPROC_DIR=/tmp/portal_metrics
      # Notifications
      - NOTIFICATIONS_ENABLED=${NOTIFICATIONS_ENABLED:-false}
      - SLACK_ALERT_WEBHOOK_URL=${SLACK_ALERT_WEBHOOK_URL:-}
      - SLACK_ALERT_CHANNEL=${SLACK_ALERT_CHANNEL:-#portal-alerts}
      - TELEGRAM_ALERT_BOT_TOKEN=${TELEGRAM_ALERT_BOT_TOKEN:-}
      - TELEGRAM_ALERT_CHANNEL_ID=${TELEGRAM_ALERT_CHANNEL_ID:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-portal@portal.local}
      - EMAIL_ALERT_TO=${EMAIL_ALERT_TO:-}
      - PUSHOVER_API_TOKEN=${PUSHOVER_API_TOKEN:-}
      - PUSHOVER_USER_KEY=${PUSHOVER_USER_KEY:-}
      - ALERT_BACKEND_DOWN_THRESHOLD=${ALERT_BACKEND_DOWN_THRESHOLD:-3}
      - ALERT_NO_HEALTHY_BACKENDS=${ALERT_NO_HEALTHY_BACKENDS:-true}
      - ALERT_SUMMARY_ENABLED=${ALERT_SUMMARY_ENABLED:-true}
      - ALERT_SUMMARY_HOUR=${ALERT_SUMMARY_HOUR:-8}
      - ALERT_SUMMARY_TIMEZONE=${ALERT_SUMMARY_TIMEZONE:-America/Chicago}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: []
    # P7: CPU/memory limits keep the router isolated from noisy neighbours.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9099/health')"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ── Open WebUI — Chat Interface ───────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    pull_policy: always
    container_name: portal5-open-webui
    restart: unless-stopped
    ports:
      # Default: localhost-only (127.0.0.1:8080).
      # Set ENABLE_REMOTE_ACCESS=true in .env to expose on all interfaces (0.0.0.0:8080).
      - "${WEBUI_LISTEN_ADDR:-127.0.0.1}:8080:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      # ── Model source ────────────────────────────────────────────────────────
      # Portal Pipeline is the SOLE model source — no direct Ollama access
      - OPENAI_API_BASE_URL=http://portal-pipeline:9099/v1
      - OPENAI_API_KEY=${PIPELINE_API_KEY}

      # ── Image generation (ComfyUI) ───────────────────────────────────────────
      - ENABLE_IMAGE_GENERATION=True
      - IMAGE_GENERATION_ENGINE=comfyui
      - COMFYUI_BASE_URL=${COMFYUI_URL:-http://host.docker.internal:8188}

      # ── Web Search (SearXNG) ─────────────────────────────────────────────────
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json&language=en
      - RAG_WEB_SEARCH_RESULT_COUNT=5
      - RAG_WEB_SEARCH_CONCURRENT_REQUESTS=10

      # ── RAG / Knowledge Base ────────────────────────────────────────────────
      # Harrier-0.6B embedding (Microsoft, SOTA MTEB-v2, 32K context, MIT license)
      # Served by portal5-embedding service on port 8917
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_OPENAI_API_BASE_URL=http://portal5-embedding:8917/v1
      - RAG_OPENAI_API_KEY=portal-embedding
      - RAG_EMBEDDING_MODEL=microsoft/harrier-oss-v1-0.6b
      - ENABLE_RAG_LOCAL_WEB_FETCH=true
      # bge-reranker-v2-m3 (BAAI, cross-encoder reranker, ~0.6B)
      - RAG_RERANKING_MODEL=BAAI/bge-reranker-v2-m3
      - RAG_RERANKING_MODEL_TRUST_REMOTE_CODE=true
      - CHUNK_SIZE=1500
      - CHUNK_OVERLAP=100
      - PDF_EXTRACT_IMAGES=true
      - ENABLE_RAG_HYBRID_SEARCH=true

      # ── Cross-Session Memory ────────────────────────────────────────────────
      - ENABLE_MEMORY_FEATURE=true
      - MEMORY_EMBEDDING_MODEL=microsoft/harrier-oss-v1-0.6b

      # ── Authentication & Session Security ───────────────────────────────────
      - WEBUI_AUTH=true
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_SESSION_COOKIE_SAME_SITE=lax
      - WEBUI_SESSION_COOKIE_SECURE=false  # Set to true when behind HTTPS proxy
      - JWT_EXPIRES_IN=24h                 # Session duration

      # ── User Registration & Roles ────────────────────────────────────────────
      # new signups require admin approval before they can use the system
      # Admin approves at: Admin Panel > Users > set role to 'user'
      # To allow immediate access: change to DEFAULT_USER_ROLE=user
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-true}
      - DEFAULT_USER_ROLE=pending
      - ENABLE_LOGIN_FORM=true

      # ── User Permissions ────────────────────────────────────────────────────
      # Users can delete their own chats, edit their own messages
      - USER_PERMISSIONS_CHAT_DELETION=true
      - USER_PERMISSIONS_CHAT_EDITING=true
      # Users cannot share chats publicly or access admin features
      - ENABLE_COMMUNITY_SHARING=false

      # ── Admin Controls ───────────────────────────────────────────────────────
      # Admin can view all users' chats for moderation/support
      - ENABLE_ADMIN_CHAT_ACCESS=true
      - ENABLE_ADMIN_EXPORT=true

      # ── Features ────────────────────────────────────────────────────────────
      - ENABLE_MESSAGE_RATING=true
      - ENABLE_WORKSPACE=true
      - ENABLE_CHANNELS=false         # Disable public channels (private chats only)
      - SAFE_MODE=false               # Allow full tool access for approved users

      # ── Speech (MLX-native on host via mlx-audio) ───────────────────────────
      # Primary: mlx-speech server on host (:8918) — Qwen3-TTS + Qwen3-ASR + Kokoro
      # Fallback: Docker mcp-tts (:8916) and mcp-whisper (:8915) still run as backup
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=${MLX_SPEECH_URL:-http://host.docker.internal:8918}
      - AUDIO_TTS_OPENAI_API_KEY=portal-speech
      - AUDIO_TTS_MODEL=kokoro
      - AUDIO_TTS_VOICE=af_heart
      - AUDIO_STT_ENGINE=openai
      - AUDIO_STT_OPENAI_API_BASE_URL=${MLX_SPEECH_URL:-http://host.docker.internal:8918}
      - AUDIO_STT_OPENAI_API_KEY=portal-speech
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      portal-pipeline:
        condition: service_healthy
      searxng:
        condition: service_started
    # P7: Memory limit prevents Open WebUI from consuming unbounded RAM.
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Open WebUI Init — Auto-seeds on fresh volume ──────────────────────────
  openwebui-init:
    image: python:3.11-slim
    container_name: portal5-init
    restart: "no"
    depends_on:
      open-webui:
        condition: service_healthy
    environment:
      - OPENWEBUI_URL=http://open-webui:8080
      - OPENWEBUI_ADMIN_EMAIL=${OPENWEBUI_ADMIN_EMAIL:-admin@portal.local}
      - OPENWEBUI_ADMIN_PASSWORD=${OPENWEBUI_ADMIN_PASSWORD}
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-pending}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-true}
    volumes:
      - ../../scripts:/scripts:ro
      - ../../imports:/imports:ro
      - ../../config/personas:/personas:ro
    command: >
      sh -c "pip install httpx pyyaml --quiet && python /scripts/openwebui_init.py"

  # ── MCP: Document Generation (Word, PowerPoint, Excel) ───────────────────
  mcp-documents:
    build:
      context: ../..
      dockerfile: Dockerfile.mcp
    container_name: portal5-mcp-documents
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DOCUMENTS_HOST_PORT:-8913}:8913"
    environment:
      - DOCUMENTS_MCP_PORT=8913
      - MCP_PORT=8913
      - OUTPUT_DIR=/app/data/generated
    command: ["python", "-m", "portal_mcp.documents.document_mcp"]
    volumes:
      - ${AI_OUTPUT_DIR:-${HOME}/AI_Output}:/app/data/generated
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8913/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  # MCP Music runs natively on the host (not in Docker) for MPS/Metal GPU access.
  # Install: ./launch.sh install-music
  # Start:   ./launch.sh up  (auto-started by _ensure_native_services)

    # ── MCP: Text-to-Speech (Kokoro / Fish Speech) ────────────────────────────
  mcp-tts:
    build:
      context: ../..
      dockerfile: Dockerfile.mcp
    container_name: portal5-mcp-tts
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TTS_HOST_PORT:-8916}:8916"
    environment:
      - TTS_MCP_PORT=8916
      - MCP_PORT=8916
      - TTS_BACKEND=${TTS_BACKEND:-kokoro}
      - TTS_DEFAULT_VOICE=${TTS_DEFAULT_VOICE:-af_heart}
      - OUTPUT_DIR=/app/data/generated
      - HF_HOME=/app/data/hf_cache
      - HF_TOKEN=${HF_TOKEN:-}
    command: ["python", "-m", "portal_mcp.generation.tts_mcp"]
    volumes:
      - ${AI_OUTPUT_DIR:-${HOME}/AI_Output}:/app/data/generated
      - portal5-hf-cache:/app/data/hf_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8916/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

    # ── MCP: Whisper Transcription ────────────────────────────────────────────
  mcp-whisper:
    build:
      context: ../..
      dockerfile: Dockerfile.mcp
    container_name: portal5-mcp-whisper
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WHISPER_HOST_PORT:-8915}:8915"
    environment:
      - WHISPER_MCP_PORT=8915
      - MCP_PORT=8915
      - HF_HOME=/app/data/hf_cache
      - HF_TOKEN=${HF_TOKEN:-}
    command: ["python", "-m", "portal_mcp.generation.whisper_mcp"]
    volumes:
      - portal5-hf-cache:/app/data/hf_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8915/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  # ── Embedding + Reranker Service ─────────────────────────────────────────
  # Microsoft Harrier-0.6B (SOTA embedding, 32K ctx, MIT license)
  # Serves OpenAI-compatible /v1/embeddings endpoint for Open WebUI RAG
  portal5-embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7
    container_name: portal5-embedding
    ports:
      - "127.0.0.1:${EMBEDDING_HOST_PORT:-8917}:8917"
    environment:
      - MODEL_ID=microsoft/harrier-oss-v1-0.6b
      - PORT=8917
      - MAX_CLIENT_BATCH_SIZE=32
      - MAX_BATCH_TOKENS=32768
    volumes:
      - portal5-hf-cache:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8917/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G

  # ── Docker-in-Docker (isolated execution environment for code sandbox) ──────
  dind:
    image: docker:27-dind
    container_name: portal5-dind
    restart: unless-stopped
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=        # Disable TLS — internal network only
    volumes:
      - dind-storage:/var/lib/docker
      - sandbox-work:/app/data/sandbox  # Shared with mcp-sandbox for code files
    # P7: Resource limits prevent DinD from consuming all system RAM/CPU.
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "4.0"
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 20s
      timeout: 10s
      start_period: 30s
      retries: 5

    # ── MCP: Code Execution Sandbox ───────────────────────────────────────────
  mcp-sandbox:
    build:
      context: ../..
      dockerfile: Dockerfile.mcp
    container_name: portal5-mcp-sandbox
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SANDBOX_HOST_PORT:-8914}:8914"
    environment:
      - SANDBOX_MCP_PORT=8914
      - MCP_PORT=8914
      - SANDBOX_TIMEOUT=${SANDBOX_TIMEOUT:-30}
      - SANDBOX_ENABLED=true
      - SANDBOX_DIR=/app/data/sandbox
      # Point at DinD instead of host Docker
      - DOCKER_HOST=tcp://dind:2375
    # Run as root to chown shared volume on startup, then drop to portal
    user: root
    entrypoint: ["sh", "-c", "chown portal:portal /app/data/sandbox 2>/dev/null; exec su portal -c 'python -m portal_mcp.execution.code_sandbox_mcp'"]
    depends_on:
      dind:
        condition: service_healthy
    volumes:
      - sandbox-work:/app/data/sandbox  # Shared with dind for code execution
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8914/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    # NO docker.sock mount

  # ── MCP: ComfyUI Bridge (image/video via ComfyUI) ────────────────────────────
  mcp-comfyui:
    build:
      context: ../..
      dockerfile: Dockerfile.mcp
    container_name: portal5-mcp-comfyui
    restart: unless-stopped
    ports:
      - "127.0.0.1:${COMFYUI_MCP_HOST_PORT:-8910}:8910"
    environment:
      - COMFYUI_MCP_PORT=8910
      - MCP_PORT=8910
      - COMFYUI_URL=${COMFYUI_URL:-http://host.docker.internal:8188}
      - IMAGE_BACKEND=${IMAGE_BACKEND:-flux}
      - FLUX_CKPT_FILE=${FLUX_CKPT_FILE:-flux1-schnell.safetensors}
      - FLUX_CLIP_L_FILE=${FLUX_CLIP_L_FILE:-text_encoder/model.safetensors}
      - FLUX_CLIP_T5_FILE=${FLUX_CLIP_T5_FILE:-text_encoder_2/model-00001-of-00002.safetensors}
      - FLUX_VAE_FILE=${FLUX_VAE_FILE:-ae.safetensors}
      - COMFYUI_TIMEOUT=${COMFYUI_TIMEOUT:-1200}
    command: ["python", "-m", "portal_mcp.generation.comfyui_mcp"]
    depends_on: []
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8910/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  # ── MCP: Video Generation (via ComfyUI Wan2.2) ────────────────────────────
  mcp-video:
    build:
      context: ../..
      dockerfile: Dockerfile.mcp
    container_name: portal5-mcp-video
    restart: unless-stopped
    ports:
      - "127.0.0.1:${VIDEO_MCP_HOST_PORT:-8911}:8911"
    environment:
      - VIDEO_MCP_PORT=8911
      - MCP_PORT=8911
      - COMFYUI_URL=${COMFYUI_URL:-http://host.docker.internal:8188}
      - OUTPUT_DIR=/app/data/generated
      - VIDEO_BACKEND=${VIDEO_BACKEND:-wan22}
      - VIDEO_MODEL_FILE=${VIDEO_MODEL_FILE:-hunyuan_video_t2v_720p_bf16.safetensors}
      - HUNYUAN_CLIP_L=${HUNYUAN_CLIP_L:-hunyuan-clip/model.safetensors}
      - HUNYUAN_LLAVA=${HUNYUAN_LLAVA:-llava_llama3_fp8_scaled.safetensors}
      - HUNYUAN_VAE=${HUNYUAN_VAE:-hunyuan_video_vae_bf16.safetensors}
      - HUNYUAN_NSFW_LORA=${HUNYUAN_NSFW_LORA:-nsfw-e7.safetensors}
      - HUNYUAN_NSFW_LORA_STRENGTH=${HUNYUAN_NSFW_LORA_STRENGTH:-0.85}
      - VIDEO_TIMEOUT=${VIDEO_TIMEOUT:-1200}
    command: ["python", "-m", "portal_mcp.generation.video_mcp"]
    depends_on: []
    volumes:
      - ${AI_OUTPUT_DIR:-${HOME}/AI_Output}:/app/data/generated
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8911/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  # ── Telegram Bot ─────────────────────────────────────────────────────────────
  # Enabled when TELEGRAM_BOT_TOKEN is set in .env
  # Get a token from @BotFather: https://t.me/BotFather
  portal-telegram:
    build:
      context: ../..
      dockerfile: Dockerfile.mcp
    container_name: portal5-telegram
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://portal-pipeline:9099/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_USER_IDS=${TELEGRAM_USER_IDS:-}
      - PIPELINE_URL=http://portal-pipeline:9099
      - PIPELINE_API_KEY=${PIPELINE_API_KEY}
      - TELEGRAM_DEFAULT_WORKSPACE=${TELEGRAM_DEFAULT_WORKSPACE:-auto}
    command: ["python", "-m", "portal_channels.telegram.bot"]
    depends_on:
      portal-pipeline:
        condition: service_healthy
    profiles:
      - telegram

  # ── Slack Bot ─────────────────────────────────────────────────────────────────
  # Enabled when SLACK_BOT_TOKEN and SLACK_APP_TOKEN are set in .env
  # Create at: https://api.slack.com/apps — enable Socket Mode
  portal-slack:
    build:
      context: ../..
      dockerfile: Dockerfile.mcp
    container_name: portal5-slack
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://portal-pipeline:9099/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - PIPELINE_URL=http://portal-pipeline:9099
      - PIPELINE_API_KEY=${PIPELINE_API_KEY}
      - SLACK_DEFAULT_WORKSPACE=${SLACK_DEFAULT_WORKSPACE:-auto}
    command: ["python", "-m", "portal_channels.slack.bot"]
    depends_on:
      portal-pipeline:
        condition: service_healthy
    profiles:
      - slack

  # ── SearXNG — Self-hosted privacy-respecting web search ──────────────────
  searxng:
    image: searxng/searxng:latest
    pull_policy: always
    container_name: portal5-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:8080"
    volumes:
      - ../../config/searxng:/etc/searxng:rw
      - searxng-data:/var/lib/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8088/
      - INSTANCE_NAME=Portal5 Search
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── ComfyUI — Image and Video Generation Engine (opt-in, native is default) ──
  # Uses CPU by default (works everywhere). Enable GPU profile for CUDA.
  # Models are downloaded by comfyui-model-init on first start.
  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest-cpu
    platform: linux/amd64
    container_name: portal5-comfyui
    restart: unless-stopped
    profiles:
      - docker-comfyui
    ports:
      - "127.0.0.1:8188:8188"
    volumes:
      - comfyui-models:/opt/ComfyUI/models
      - comfyui-output:/opt/ComfyUI/output
      - ../../config/comfyui/workflows:/opt/ComfyUI/workflows:ro
    environment:
      - COMFYUI_EXTRA_ARGS=--listen 0.0.0.0 --port 8188
      - CF_TORCH_DEVICE=${CF_TORCH_DEVICE:-cpu}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 5

  # ── ComfyUI Model Init — downloads image/video models on first run (opt-in) ──
  comfyui-model-init:
    image: python:3.11-slim
    container_name: portal5-comfyui-init
    restart: "no"
    profiles:
      - docker-comfyui
    depends_on:
      comfyui:
        condition: service_healthy
    volumes:
      - comfyui-models:/models
      - ../../scripts:/scripts:ro
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - IMAGE_MODEL=${IMAGE_MODEL:-flux-schnell}
      - VIDEO_MODEL=${VIDEO_MODEL:-wan2.2}
      - MODELS_DIR=/models/checkpoints
    command: >
      sh -c "pip install huggingface_hub --quiet && python /scripts/download_comfyui_models.py"

  # ── Prometheus — Metrics collection ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: portal5-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ../../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Grafana — Metrics dashboards ────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: portal5-grafana
    restart: unless-stopped
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../../config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  ollama-models:       # Ollama model weights — survives docker compose down
  open-webui-data:     # Open WebUI database — wipe with ./launch.sh clean
  portal5-hf-cache:    # HuggingFace model cache (music, TTS, whisper)
  dind-storage:        # DinD persistent storage
  sandbox-work:        # Shared sandbox code files (mcp-sandbox ↔ dind)
  searxng-data:        # SearXNG data
  comfyui-models:      # ComfyUI model weights
  comfyui-output:      # ComfyUI generated images/videos
  prometheus-data:     # Prometheus metrics data
  grafana-data:        # Grafana dashboards/data
  pipeline-metrics-state:  # Persistent metrics state (JSON, survives restarts)
