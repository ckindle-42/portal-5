# Coding scenario fixture for the persona matrix.
#
# Each scenario specifies: prompt, applies_to (persona slugs or coding:*),
# assertions (subset registered in tests/lib/coding_assertions.py), and an
# optional language/constraint tag that parameterized assertions consume.
#
# Adding a new scenario: append a row. Adding a new language/constraint:
# extend _LANGUAGE_SIGNATURES / _STDLIB_VIOLATION_HINTS in
# tests/lib/coding_assertions.py, then reference the new key by spec
# language.<X> / constraint.<X>.

scenarios:

  # ── A. Self-evident task — "build it, don't ask" ──────────────────────
  - id: self-evident-canvas-snake
    description: >
      Self-evident creative-coding ask. Persona must deliver a complete
      single-file solution without stalling on clarification questions.
    applies_to: ["coding:*"]
    language: html
    prompt: |
      Build a playable Snake game in a single self-contained HTML file.
      Use vanilla JavaScript and HTML Canvas. Arrow keys to control,
      score displayed at the top, snake grows when it eats food, game
      over on self-collision. Ship as one file ready to open in a browser.
    assertions:
      - structural.code_block_present
      - structural.no_truncation_or_placeholders
      - language.html
      - constraint.html_single_file
      - behavioral.no_clarification_stall

  # ── B. Stdlib-only constraint ──────────────────────────────────────────
  - id: stdlib-only-python-csv
    description: >
      Python task with explicit stdlib-only constraint. Tests whether the
      model honors the constraint or reaches for pandas/numpy.
    applies_to: ["coding:*"]
    language: python
    constraint: python_no_external
    prompt: |
      Write a Python script using ONLY the standard library (no pandas,
      no numpy, no third-party packages) that:
        - reads a CSV from stdin
        - groups rows by the first column
        - for each group, computes the mean of the second column
          (treat as float; skip non-numeric)
        - writes "<group>,<mean>" to stdout, sorted by group name

      The script must be runnable as `python3 script.py < input.csv`.
    assertions:
      - structural.code_block_present
      - structural.no_truncation_or_placeholders
      - language.python
      - constraint.python_no_external

  # ── C. SQL with explicit join requirement ─────────────────────────────
  - id: sql-join-with-aggregation
    description: >
      SQL query that requires both a JOIN and an aggregation. Tests
      whether the model produces SQL syntax (vs. pseudocode prose).
    applies_to: ["coding:*"]
    language: sql
    prompt: |
      Given two tables:
        users(id INT, name TEXT, signup_date DATE)
        orders(id INT, user_id INT, amount DECIMAL, ordered_at DATE)

      Write a single SQL query that returns each user's total order count
      and total revenue, including users who have placed zero orders.
      Order results by total revenue descending, then user name ascending.
      Use ANSI SQL — no vendor-specific extensions.
    assertions:
      - structural.code_block_present
      - language.sql

  # ── D. Bash script with shebang + safe-mode ──────────────────────────
  - id: bash-script-defensive
    description: >
      Asks for a defensive bash script. Tests structural delivery + that
      the response is bash, not pseudocode.
    applies_to: ["coding:*"]
    language: bash
    prompt: |
      Write a single bash script that:
        - takes a directory path as its first positional argument
        - exits non-zero with a clear message if the path is missing or
          not a directory
        - prints, for each file in the directory (non-recursive), the
          file size in bytes and the file name, sorted by size descending
        - uses `set -euo pipefail` defensively

      Provide the script as a complete, self-contained file with a
      proper shebang line.
    assertions:
      - structural.code_block_present
      - structural.no_truncation_or_placeholders
      - language.bash

  # ── E. Self-evident — Rust ─────────────────────────────────────────────
  - id: self-evident-rust-fizzbuzz
    description: >
      Trivial language-fingerprint check. If the persona delivers Rust,
      it should clearly look like Rust — not pseudocode.
    applies_to: ["coding:*"]
    language: rust
    prompt: |
      Write a complete Rust program that prints FizzBuzz for numbers 1
      through 100. Use `cargo` conventions — name a single src/main.rs
      and show it as one code block.
    assertions:
      - structural.code_block_present
      - structural.no_truncation_or_placeholders
      - language.rust
      - behavioral.no_clarification_stall

  # ── F. Async HTTP with retry/backoff (UAT WS-02 predecessor) ─────────
  - id: async-http-retry-wrapper
    description: >
      Async HTTP wrapper that handles 4xx/5xx with exponential backoff.
      UAT WS-02 (Code Expert) scored 1/6 on this with Laguna because the
      model produced no code block. Tests structural delivery + httpx
      idiom + retry-status-code recognition. V2: bound to
      pythoncodegeneratorcleanoptimizedproduction-ready (Ship-It shape) —
      the most general "produce well-typed async Python" persona in the
      Ship-It cohort.
    applies_to: ["pythoncodegeneratorcleanoptimizedproduction-ready"]
    language: python
    prompt: |
      Write an async Python function `fetch_with_retry(url, max_attempts=3)`
      that uses httpx.AsyncClient. It must:
        - retry on HTTP 429, 500, 502, 503, 504
        - use exponential backoff with asyncio.sleep (start 1s, double each retry)
        - return the response body on success, raise on exhaustion
        - use full type hints

      Provide the function in a single fenced code block. No prose outside
      the code block.
    assertions:
      - structural.code_block_present
      - structural.no_truncation_or_placeholders
      - language.python
      - structural.required_elements:
          elements:
            - "httpx.AsyncClient"
            - "asyncio.sleep"
            - "429"
            - "503"
            - "->"   # type-hint arrow proxy

  # ── G. SQL stateful session (UAT P-D14 predecessor) ──────────────────
  - id: sql-stateful-multi-statement
    description: >
      Multi-statement SQL session — CREATE, INSERT, SELECT in sequence,
      with row results between statements. UAT P-D14 scored 1/4 because
      Laguna returned prose without row counts or stated INSERT acks.
      Tests the SQL REPL contract. V2: bound to sqlterminal (REPL shape).
    applies_to: ["sqlterminal"]
    language: sql
    prompt: |
      You are a SQL terminal. I will give you statements one block at a time.
      Respond as a real PostgreSQL REPL would — show the result of each
      statement (row count, returned rows, or INSERT/UPDATE acks).

      Block 1:
        CREATE TABLE users (id SERIAL PRIMARY KEY, username TEXT NOT NULL, role TEXT);
        INSERT INTO users (username, role) VALUES ('alice', 'analyst'), ('bob', 'admin'), ('carol', 'analyst');
        SELECT username, role FROM users WHERE role = 'analyst';
        INSERT INTO users (username, role) VALUES ('newuser', 'analyst');
        SELECT username FROM users WHERE username = 'newuser';

      Show the output of each statement in order, in the format a psql
      terminal would print.
    assertions:
      - structural.code_block_present
      - language.sql
      - behavioral.stateful_session:
          language: sql

  # ── H. Code review with confidence labels (UAT P-D04 predecessor) ────
  - id: code-review-with-confidence
    description: >
      Deep code-audit task requiring confidence labels per finding. UAT
      P-D04 scored 1/4 because Laguna missed the mutation/aliasing bug
      and omitted confidence levels entirely. Tests structured audit
      output. V2: bound to codereviewer (Audit shape, FAIL row).
    applies_to: ["codereviewer"]
    language: python
    prompt: |
      Audit this Python function for correctness and security. For each
      issue, label it [HIGH], [MEDIUM], or [LOW] confidence:

      ```python
      def merge_configs(base: dict, override: dict) -> dict:
          result = base
          for k, v in override.items():
              if isinstance(v, dict) and k in result:
                  result[k] = merge_configs(result[k], v)
              else:
                  result[k] = v
          return result
      ```

      List every issue you find. Required elements in your audit:
        - flag the aliasing/mutation bug (result = base mutates the caller)
        - flag the unbounded recursion risk
        - assign a confidence label to each finding
        - propose a fix for the highest-confidence issue
    assertions:
      - structural.required_elements:
          elements:
            - "mutation"
            - "alias"
            - "recursion"
            - "fix"
            # [HIGH] removed per TASK_V2_SCENARIO_FIXES_V1.md section A1 — 0/5 models
            # produced the exact bracketed token; they reliably produce
            # equivalent confidence-framing language (High, **HIGH**,
            # severity: high, etc.) but the AND-logic required-elements
            # check cannot accept any-of variants. The remaining four
            # elements carry the audit-shape signal; confidence labeling
            # is stylistic and not a model-capability gate.

  # ── I. Solidity audit disclaimer + reentrancy (UAT P-D10 predecessor) ─
  # V2: ethereumdeveloper PRUNED per A3 — Solidity is a niche shape outside
  # auto-coding's primary load. Scenario retained in the file for future use
  # but applies_to is the empty list so no V2 cell is produced.
  - id: solidity-vault-with-disclaimer
    description: >
      Solidity contract task with explicit security-mode requirements.
      UAT P-D10 scored 2/5 because Laguna omitted the pragma, the
      reentrancy guard, and produced no code block. Pruned from V2 per A3
      (Solidity is a niche shape, not core auto-coding). Retained for any
      future security-coding workspace.
    applies_to: []
    language: javascript    # closest registered signature; constraint elsewhere
    prompt: |
      Write a Solidity smart contract for a simple ETH vault with deposit
      and withdraw functions. Requirements:
        - pragma solidity ^0.8.20
        - use OpenZeppelin ReentrancyGuard (nonReentrant modifier on withdraw)
        - emit Deposit and Withdraw events
        - close with a clear audit disclaimer ("DO NOT DEPLOY TO MAINNET WITHOUT
          A PROFESSIONAL SECURITY AUDIT") at the top or bottom of your response

      Provide the contract in a single fenced code block.
    assertions:
      - structural.code_block_present
      - structural.no_truncation_or_placeholders
      - structural.required_elements:
          elements:
            - "pragma solidity"
            - "nonReentrant"
            - "ReentrancyGuard"
            - "mainnet"

  # ── J. E2E Playwright test with selectors (UAT P-B01 predecessor) ────
  - id: e2e-playwright-login-test
    description: >
      End-to-end Playwright test with explicit selector strategy. UAT
      P-B01 scored 2/5 because Laguna produced no code block and used
      no Playwright primitives. Tests modern selector idiom. V2: bound to
      e2etestauthor (Composite shape).
    applies_to: ["e2etestauthor"]
    language: javascript
    prompt: |
      Write a Playwright test in JavaScript (NOT TypeScript) that tests
      a login form at https://example.com/login. The test must:
        - use getByRole/getByLabel selectors (NOT CSS or XPath)
        - cover one happy path (correct credentials → redirect to /dashboard)
        - cover one error path (wrong password → error message visible)
        - use page.goto, expect, and async/await

      Provide the complete .spec.js file in a single fenced code block.
    assertions:
      - structural.code_block_present
      - structural.no_truncation_or_placeholders
      - language.javascript
      - structural.required_elements:
          elements:
            - "getByRole"
            - "page.goto"
            - "expect"
            - "/dashboard"

  # ── K. Linux terminal stateful (UAT P-D12 predecessor, REPL shape) ───
  - id: linux-terminal-stateful
    description: >
      Multi-command bash session — cd, echo to file, cat, pwd in sequence,
      with state preserved between commands. UAT P-D12 scored 2/4 because
      Laguna lost the working directory between commands and didn't show
      cat output. Tests bash REPL state contract.
    applies_to: ["linuxterminal"]
    language: bash
    prompt: |
      You are a Linux terminal. Execute these commands in sequence,
      preserving working-directory and file-system state between them.
      Show only the terminal output for each command — no prose, no code
      blocks, just what the terminal would print.

      $ mkdir -p /tmp/portal_test
      $ cd /tmp/portal_test
      $ echo "hello portal" > greeting.txt
      $ cat greeting.txt
      $ pwd
      $ ls -la
    assertions:
      - structural.required_elements:
          elements:
            - "hello portal"
            - "/tmp/portal_test"
            - "greeting.txt"
      - behavioral.stateful_session:
          language: bash

  # ── L. Python REPL traceback (UAT P-D13 predecessor, REPL shape) ─────
  - id: python-repl-traceback
    description: >
      Python REPL session that prints, then raises IndexError. UAT P-D13
      scored 1/3 because Laguna gave prose explanation instead of REPL
      output (>>> prompt, Traceback line). Tests Python REPL contract.
    applies_to: ["pythoninterpreter"]
    language: python
    prompt: |
      You are a Python 3.11 REPL. Execute these statements one by one,
      printing exactly what the REPL would print after each. No prose,
      no commentary — just the REPL output.

      >>> system = "portal v6"
      >>> print(f"System: {system}")
      >>> data = [1, 2, 3]
      >>> print(data[10])
    assertions:
      - structural.required_elements:
          elements:
            - "System: portal v6"
            - "IndexError"
            - "Traceback"
      - behavioral.stateful_session:
          language: python

  # ── M. QA test enumeration (UAT P-D18 predecessor, Audit shape) ──────
  - id: qa-test-enumeration
    description: >
      File-upload validation test design — must enumerate security, boundary,
      and integration tests. UAT P-D18 scored 2/5 because Laguna mentioned
      validation in general but didn't name security/boundary/multiple
      test types. Tests structured Audit-shape enumeration.
    applies_to: ["softwarequalityassurancetester"]
    prompt: |
      Design a test plan for a file-upload endpoint with these constraints:
        - accepts only .pdf, .docx, .xlsx
        - max file size 10MB
        - virus-scans via ClamAV before storage
        - returns 400 on rejection, 201 on success

      Enumerate at least 8 distinct test cases, each tagged by category:
        [SECURITY], [BOUNDARY], [INTEGRATION], [HAPPY-PATH], [ERROR-PATH]
      For each test, specify input, expected output, and rationale.
    assertions:
      - structural.required_elements:
          elements:
            - "[SECURITY]"
            - "[BOUNDARY]"
            - "10MB"
            - "ClamAV"
            - "malicious"

  # ── N. JavaScript console strict output (UAT P-D11 PASS regression) ──
  - id: js-console-strict-output
    description: >
      JS console exact-output test. UAT P-D11 PASSED with Laguna — included
      as a REPL-shape regression guard. A candidate that breaks this while
      gaining a FAIL persona is a worse trade.
    applies_to: ["javascriptconsole"]
    language: javascript
    prompt: |
      You are a strict V8 JavaScript console. Output exactly what each
      statement prints. No prose. No code fences.

      > typeof null
      > [].foo
      > [1,2,3].map(x => x * 2)
      > new Map().get('nothing')
    assertions:
      - structural.required_elements:
          elements:
            - "object"
            - "undefined"
            - "2"
            - "4"
            - "6"

  # ── O. GitHub destructive warning (UAT P-D09 PASS regression) ────────
  - id: github-destructive-warning
    description: >
      Git destructive-command guidance. UAT P-D09 PASSED with Laguna —
      Ship-It-shape regression guard. The "knowledge + warning" shape is
      the loosest fit in Ship-It (see A4 note on githubexpert).
    applies_to: ["githubexpert"]
    prompt: |
      I pushed 3 commits to a shared feature branch but realized they
      contain a leaked API key. Two teammates have already pulled. What
      do I do?
    assertions:
      - structural.required_elements:
          elements:
            - "rotate"
            - "force"
            - "teammates"
            - "warning"

  # ── P. Bug discovery enumeration (UAT P-D02 PASS regression) ─────────
  - id: bug-classification-by-type
    description: >
      Multi-bug enumeration by type. UAT P-D02 PASSED with Laguna —
      Audit-shape regression guard, relaxed contract version.
    applies_to: ["bugdiscoverycodeassistant"]
    language: python
    prompt: |
      Find every issue in this function. For each, label the type:
        [SECURITY], [LOGIC], [RUNTIME], [STYLE]

      ```python
      def get_user(username):
          import os
          result = os.system(f"grep {username} /etc/passwd")
          users = result.split(",")
          return users[5]
      ```
    assertions:
      - structural.required_elements:
          elements:
            - "[SECURITY]"
            - "injection"
            - "command"
            - "[RUNTIME]"

  # ── Q. Code review PR scope (UAT P-D03 PASS regression) ──────────────
  - id: code-review-pr-scope
    description: >
      Constrained PR review — only critique the changed lines, not the
      whole file. UAT P-D03 PASSED with Laguna — Audit-shape regression
      guard. Tests scope discipline (don't critique check_db, which is
      unchanged context).
    applies_to: ["codereviewassistant"]
    language: python
    prompt: |
      Review only the lines marked CHANGED in this diff. Do not critique
      unchanged context lines.

      ```python
      def login(req):
      -     token = jwt.encode({"user": req.user}, "secret")
      +     token = jwt.encode(  # CHANGED
      +         {"user": req.user, "exp": time.time() + 3600},  # CHANGED
      +         SECRET_KEY,  # CHANGED
      +         algorithm="HS256",  # CHANGED
      +     )
            check_db()  # unchanged context
            return token
      ```
    assertions:
      - structural.required_elements:
          elements:
            - "exp"
            - "SECRET_KEY"
            - "3600"

  # ── R. JWT three endpoints (UAT P-D05 predecessor, Composite shape) ──
  - id: jwt-three-endpoints
    description: >
      Three-endpoint JWT auth implementation in one file — /auth/login,
      /protected, /auth/refresh. UAT P-D05 scored 2/5 because Laguna
      produced no code block and missed two of the three endpoints. Tests
      Composite-shape multi-element coordination.
    applies_to: ["fullstacksoftwaredeveloper"]
    language: python
    prompt: |
      Implement three Flask endpoints in a single Python file:
        - POST /auth/login — accepts {username, password}, returns JWT
        - GET /protected — requires Authorization: Bearer <token>
        - POST /auth/refresh — refreshes a near-expiring token

      Use python-jose for JWT, include an `exp` claim (1 hour), read the
      secret from os.environ (never hardcode). Provide the complete file
      in a single fenced code block.
    assertions:
      - structural.code_block_present
      - structural.no_truncation_or_placeholders
      - language.python
      - structural.required_elements:
          elements:
            - "/auth/login"
            - "/protected"
            - "/auth/refresh"
            - "exp"
            - "os.environ"

  # ── S. E2E debugger root cause (UAT P-B04 predecessor, Composite) ────
  - id: e2e-debugger-root-cause
    description: >
      Flaky-test debugging — must propose timing + browser-inspection
      strategies in one response. UAT P-B04 scored 2/3 because Laguna
      identified timing but didn't suggest browser inspection. Tests
      Composite-shape multi-strategy reasoning.
    applies_to: ["e2edebugger"]
    prompt: |
      A Playwright test fails 10% of runs with "TimeoutError: page.goto
      timeout 30000ms". Logs show the test sometimes hangs on a JS modal,
      sometimes the page loads slowly under CI load. Propose root-cause
      analysis covering BOTH timing-side investigation (timeouts, retries,
      waits) AND browser-side investigation (DOM inspection, console
      errors, network panel).
    assertions:
      - structural.required_elements:
          elements:
            - "timeout"
            - "retry"
            - "console"
            - "network"
            - "browser"

  # ── T. K8s manifest complete (UAT P-D07 PASS regression, Ship-It) ────
  - id: k8s-manifest-complete
    description: >
      Complete K8s Deployment+Service manifest with readiness probe,
      resource limits, image pin. UAT P-D07 PASSED with Laguna — Ship-It
      regression guard.
    applies_to: ["devopsautomator"]
    language: html    # YAML signatures not registered; html proxy for fenced-block
    prompt: |
      Provide a complete Kubernetes manifest (Deployment + Service) for
      a Python web service with these requirements:
        - image: myorg/webapp pinned to tag v1.2.3
        - readiness probe on /health
        - resource limits: 512Mi memory, 0.5 CPU
        - 3 replicas
        - rolling update strategy
        - includes a `kubectl rollout undo` command in a comment for
          rollback reference

      Single fenced code block. Complete YAML, no placeholders.
    assertions:
      - structural.code_block_present
      - structural.no_truncation_or_placeholders
      - structural.required_elements:
          elements:
            - "v1.2.3"
            - "readinessProbe"
            - "/health"
            - "512Mi"
            - "rollout undo"

  # ── U. Creative coder particle system (UAT P-D20 PASS regression) ────
  - id: creative-particle-system
    description: >
      Self-contained HTML/JS particle system. UAT P-D20 PASSED with
      Laguna (this is the shape Laguna was selected for). Ship-It
      regression guard — overlaps with V1's self-evident-canvas-snake
      but is specific to the creativecoder persona.
    applies_to: ["creativecoder"]
    language: html
    prompt: |
      Build a self-contained HTML file with a canvas particle system:
      particles emit on space-bar, fall with gravity, fade out over 2
      seconds. Vanilla JS, no libraries. Ship it as one file, ready to
      open in a browser. Don't ask clarifying questions.
    assertions:
      - structural.code_block_present
      - structural.no_truncation_or_placeholders
      - language.html
      - behavioral.no_clarification_stall
      - structural.required_elements:
          elements:
            - "canvas"
            - "gravity"
            - "space"
