# Extends gitleaks default ruleset; only adds an allowlist for known test fixtures.
[extend]
useDefault = true

[allowlist]
description = "Portal 5 known non-secrets (test fixtures, placeholders)"
regexes = [
  '''sk-abcdefghijklmnopqrstuvwx''',   # dummy key in redaction unit test
  '''PIPELINE_API_KEY=mykey''',         # usage example in smoke_stream.sh
  '''CHANGEME''',                       # .env.example placeholder
]
paths = [
  '''\.env\.example$''',
  '''config/searxng/settings\.yml\.new$''',  # vendored upstream example config
  '''tests/benchmarks/bench_security/results/.*\.json$''',   # generated bench output; prompt_key values (e.g. eternalblue_ms17010) trip generic-api-key on entropy
  '''tests/benchmarks/bench_security/field_journal/.*\.json$''',  # same prompt_key field, journal copy
]
