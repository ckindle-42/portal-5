# Portal 5 pre-commit hooks. Install once: pip install pre-commit && pre-commit install
# Run on all files ad hoc: pre-commit run --all-files
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (block committed secrets)

  - repo: local
    hooks:
      # Guard: no two tracked files byte-identical across deploy/ ↔ portal_mcp/
      - id: no-identical-sources
        name: no duplicate source files (deploy/ ↔ portal_mcp/)
        language: python
        entry: python3 scripts/ci/check_no_identical_sources.py
        pass_filenames: false
        always_run: true

      # Guard: sync-config is idempotent — generated artifacts are never stale
      - id: generated-fresh
        name: generated artifacts fresh (sync-config idempotent)
        language: python
        additional_dependencies: ["pyyaml>=6.0.1", "pydantic>=2.5.0", "pydantic-settings>=2.1.0"]
        entry: python3 scripts/ci/check_generated_fresh.py
        pass_filenames: false
        always_run: true

      # Guard: pyproject.toml has no duplicate dependency strings
      - id: pyproject-no-dup
        name: pyproject.toml has no duplicate dependency pins
        language: python
        entry: python3 scripts/ci/check_pyproject_no_dup.py
        pass_filenames: false
        files: pyproject.toml

      # Ruff lint + format check
      - id: ruff-check
        name: ruff lint
        language: python
        entry: ruff check
        types: [python]
        args: [--fix]

      - id: ruff-format
        name: ruff format check
        language: python
        entry: ruff format --check
        types: [python]

      # Guard: architectural pre-flight — imports, routes, config, Rule 6,
      # hint validator, shim contract. Runs in ~1s before the heavier
      # pytest pass so architectural breakage is caught immediately.
      - id: validate-system
        name: system pre-flight (validate_system.py --skip-pytest)
        language: system
        entry: python3 scripts/validate_system.py --skip-pytest
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # Guard: unit-test suite passes before commit. ~4-5min parallelized
      # (pytest-xdist, -n auto) on a 14-core M-series Mac vs ~8min serial;
      # blocks commits that break the test suite. Opt-in via
      # `pre-commit install`. Uses the developer's existing venv.
      - id: pytest-unit
        name: pytest unit suite
        language: system
        entry: pytest tests/unit -n auto -x --tb=short -q
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
