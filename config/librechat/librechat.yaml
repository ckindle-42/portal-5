# LibreChat configuration for Portal 5
# Auto-generated by: python scripts/librechat_init.py --config-only
# Regenerate after adding workspaces or MCP servers.
#
# To regenerate: ./launch.sh seed-librechat --config-only
# To seed presets: ./launch.sh seed-librechat

version: "1.2.1"
cache: true

registration:
  socialLogins: []
  allowedDomains: []

endpoints:
  custom:
    - name: "Portal 5"
      apiKey: "${PIPELINE_API_KEY}"
      baseURL: "${PIPELINE_URL}"
      models:
        default:
          - auto
          - auto-coding
          - auto-reasoning
          - auto-vision
          - auto-creative
          - auto-security
          - auto-research
          - auto-data
          - auto-documents
          - auto-voice
          - auto-search
          - auto-agentic
          - specialist
          - specialist-vision
        fetch: true
      titleConvo: true
      titleModel: "auto"
      modelDisplayLabel: "Portal 5"
      iconURL: "https://raw.githubusercontent.com/ckindle-42/portal-5/main/docs/portal5-icon.png"

mcpServers:
  portal-comfyui:
    url: "http://host.docker.internal:8910/mcp"
  portal-video:
    url: "http://host.docker.internal:8911/mcp"
  portal-music:
    url: "http://host.docker.internal:8912/mcp"
  portal-documents:
    url: "http://host.docker.internal:8913/mcp"
  portal-code:
    url: "http://host.docker.internal:8914/mcp"
  portal-whisper:
    url: "http://host.docker.internal:8915/mcp"
  portal-mlx-transcribe:
    url: "http://host.docker.internal:8924/mcp"
  portal-tts:
    url: "http://host.docker.internal:8916/mcp"
  portal-security:
    url: "http://host.docker.internal:8919/mcp"
  portal-memory:
    url: "http://host.docker.internal:8920/mcp"
  portal-rag:
    url: "http://host.docker.internal:8921/mcp"
  portal-research:
    url: "http://host.docker.internal:8922/mcp"
  portal-browser:
    url: "http://host.docker.internal:8923/mcp"
