version: 1.3.11
cache: true
registration:
  socialLogins:
  - openid
  allowedDomains: []
endpoints:
  custom:
  - name: Portal 5
    apiKey: ${PIPELINE_API_KEY}
    baseURL: ${PIPELINE_URL}
    models:
      default:
      - auto
      - auto-daily
      - auto-coding
      - auto-agentic
      - auto-spl
      - auto-security
      - auto-redteam
      - auto-blueteam
      - auto-creative
      - auto-reasoning
      - auto-documents
      - auto-video
      - auto-music
      - auto-research
      - auto-vision
      - auto-data
      - auto-compliance
      - auto-mistral
      - auto-math
      fetch: true
    titleConvo: true
    titleModel: auto
    modelDisplayLabel: Portal 5
fileConfig:
  serverFileSizeLimit: 500
  endpoints:
    default:
      fileLimit: 5
      fileSizeLimit: 500
      totalSizeLimit: 500
      supportedMimeTypes:
        - "audio/mpeg"
        - "audio/mp4"
        - "audio/wav"
        - "audio/ogg"
        - "audio/webm"
        - "audio/x-m4a"
        - "audio/flac"
        - "video/mp4"
        - "video/quicktime"
        - "application/pdf"
        - "text/plain"
        - "image/jpeg"
        - "image/png"
        - "image/gif"
        - "image/webp"
mcpSettings:
  allowedDomains:
    - host.docker.internal
mcpServers:
  portal-comfyui:
    url: http://host.docker.internal:8910/mcp
    type: streamable-http
  portal-video:
    url: http://host.docker.internal:8911/mcp
    type: streamable-http
  portal-music:
    url: http://host.docker.internal:8912/mcp
    type: streamable-http
  portal-documents:
    url: http://host.docker.internal:8913/mcp
    type: streamable-http
  portal-code:
    url: http://host.docker.internal:8914/mcp
    type: streamable-http
  portal-whisper:
    url: http://host.docker.internal:8915/mcp
    type: streamable-http
  portal-mlx_transcribe:
    url: http://host.docker.internal:8924/mcp/
    type: streamable-http
  portal-tts:
    url: http://host.docker.internal:8916/mcp
    type: streamable-http
  portal-security:
    url: http://host.docker.internal:8919/mcp
    type: streamable-http
  portal-memory:
    url: http://host.docker.internal:8920/mcp
    type: streamable-http
  portal-rag:
    url: http://host.docker.internal:8921/mcp
    type: streamable-http
  portal-research:
    url: http://host.docker.internal:8922/mcp
    type: streamable-http
