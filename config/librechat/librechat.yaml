version: 1.3.11
cache: true
registration:
  socialLogins:
  - openid
  allowedDomains: []
endpoints:
  custom:
  - name: Portal 5
    apiKey: ${PIPELINE_API_KEY}
    baseURL: ${PIPELINE_URL}
    models:
      default:
      - auto
      - auto-daily
      - auto-coding
      - auto-agentic
      - auto-spl
      - auto-security
      - auto-redteam
      - auto-blueteam
      - auto-creative
      - auto-reasoning
      - auto-documents
      - auto-video
      - auto-music
      - auto-research
      - auto-vision
      - auto-data
      - auto-compliance
      - auto-mistral
      - auto-math
      fetch: true
    titleConvo: true
    titleModel: auto
    modelDisplayLabel: Portal 5
mcpServers:
  portal-comfyui:
    url: http://host.docker.internal:8910/mcp
  portal-video:
    url: http://host.docker.internal:8911/mcp
  portal-music:
    url: http://host.docker.internal:8912/mcp
  portal-documents:
    url: http://host.docker.internal:8913/mcp
  portal-code:
    url: http://host.docker.internal:8914/mcp
  portal-whisper:
    url: http://host.docker.internal:8915/mcp
  portal-mlx_transcribe:
    url: http://host.docker.internal:8924/mcp
  portal-tts:
    url: http://host.docker.internal:8916/mcp
  portal-security:
    url: http://host.docker.internal:8919/mcp
  portal-memory:
    url: http://host.docker.internal:8920/mcp
  portal-rag:
    url: http://host.docker.internal:8921/mcp
  portal-research:
    url: http://host.docker.internal:8922/mcp
  portal-browser:
    url: http://host.docker.internal:8923/mcp
