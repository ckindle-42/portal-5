    supports_tools: true
    notes: "Microsoft Phi-4-Mini (Feb 2025, MIT, 3.8B, ~2.5GB Q4, 128K ctx). Synthetic-data\
      \ training: multilingual, function calling, reasoning, math. Outperforms Llama 3.2 3B\
