# Portal 5.2.1 — Backend Registry
# OPERATOR FILE: Edit this to add cluster nodes. No code changes needed.
# After editing: docker compose restart portal-pipeline

backends:
  # ── MLX — Apple Silicon native (20-40% faster than Ollama GGUF on M-series) ─
  # Requires: ./launch.sh install-mlx && ./launch.sh pull-mlx-models
  # Only ONE MLX server runs at a time (memory constraint). The pipeline automatically
  # switches between mlx_lm (text-only: Qwen3-Coder, DeepSeek, Devstral) and
  # mlx_vlm (VLM: Qwen3.5 family) based on the requested model.
  # Switching has ~30s load penalty on first request after switch.
  #
  # MEMORY: One model in memory at a time (~2-40GB depending on model).
  # Rule: MLX active weight + ComfyUI model + Ollama loaded models < (total RAM - 8GB OS)

  - id: mlx-apple-silicon
    type: mlx
    url: "${MLX_LM_URL:-http://host.docker.internal:8081}"
    group: mlx
    models:
      # ── Text-only (served by mlx_lm on port 8081) ──────────────────────────
      # 8bit quants used on 64GB M4 Mac — one model at a time, max quality.
      # 64GB budget: 8bit model + ComfyUI (~18GB) + Ollama 3B (~3GB) + OS (~8GB) ≈ 55GB
      - mlx-community/Qwen3-Coder-Next-8bit              # Primary coder: 80B MoE (~32GB, 256k ctx)
      - mlx-community/Qwen3-Coder-30B-A3B-Instruct-8bit  # Fast agentic coder (~22GB)
      - mlx-community/DeepSeek-Coder-V2-Lite-Instruct-8bit-mlx  # SPL specialist (~12GB)
      - mlx-community/Devstral-Small-2505-8bit            # Agentic dev workflows (~18GB)
      - mlx-community/Dolphin3.0-Llama3.1-8B-8bit         # Creative / general (~9GB)
      - mlx-community/Llama-3.2-3B-Instruct-8bit          # Ultra-fast routing (~3GB)
      - mlx-community/Llama-3.3-70B-Instruct-4bit         # Heavy coding + reasoning (~40GB, 4bit only — too big for 8bit)
      # ── Claude 4.6 Opus Reasoning Distilled (Jackrong / mlx-community) ─────
      - Jackrong/MLX-Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2-8bit  # Reasoning (~22GB, 428k downloads)
      - Jackrong/MLX-Qwen3.5-9B-Claude-4.6-Opus-Reasoning-Distilled-8bit      # Documents (~9GB)
      - Jackrong/MLX-Qwen3.5-35B-A3B-Claude-4.6-Opus-Reasoning-Distilled-8bit # Compliance (~28GB, MoE 3B active)
      - Jackrong/MLX-Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2-8bit  # Data + reasoning (~22GB)
      - mlx-community/DeepSeek-R1-Distill-Qwen-32B-abliterated-4bit           # Uncensored reasoning (~18GB)
      # ── VLM (served by mlx_vlm on port 8082 — auto-switched) ──────────────
      - mlx-community/Qwen3-VL-32B-Instruct-8bit          # Vision / multimodal (~36GB)
      - mlx-community/llava-1.5-7b-8bit                   # Vision fallback (~8GB)

  # ── General (fast default, function calling, creative) ─────────────────────
  - id: ollama-general
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: general
    models:
      - dolphin-llama3:8b              # Default: fast, uncensored, strong function calling
      - llama3.2:3b-instruct-q4_K_M   # Ultra-fast fallback for routing

  # ── Coding (code generation, debugging, architecture) ─────────────────────
  - id: ollama-coding
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: coding
    models:
      - qwen3.5:9b
      - qwen3-coder:30b                             # 30B-A3B MoE (3B active), 19GB — primary Ollama coding fallback
      - deepseek-coder-v2:16b-lite-instruct-q4_K_M  # https://ollama.com/library/deepseek-coder-v2/tags
      - devstral:24b
      - glm-4.7-flash:q4_k_m             # was: hf.co/unsloth/GLM-4.7-Flash-GGUF
      - deepseek-coder-v2-lite:q4_k_m    # was: hf.co/deepseek-ai/DeepSeek-Coder-V2-Lite-Base-GGUF
      - llama3.3:70b-q4_k_m              # was: hf.co/meta-llama/Meta-Llama-3.3-70B-GGUF (PULL_HEAVY)

  # ── Security / Red Team / Blue Team ───────────────────────────────────────
  - id: ollama-security
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: security
    models:
      # ── Fast / always-available (native Ollama registry) ─────────────────
      - huihui_ai/baronllm-abliterated
      - xploiter/the-xploiter
      - lazarevtill/Llama-3-WhiteRabbitNeo-8B-v2.0:q4_0
      - deepseek-r1:32b-q4_k_m               # Threat modeling + defensive analysis (shared with reasoning)
      # ── Downloaded via huggingface-cli + imported ─────────────────────────
      - baronllm:q6_k                    # was: hf.co/AlicanKiraz0/Cybersecurity-BaronLLM_...
      - lily-cybersecurity:7b-q4_k_m     # imported by pull-models from segolilylabs/Lily-Cybersecurity-7B-v0.2-GGUF
      - dolphin3-r1-mistral:24b-q4_k_m   # was: hf.co/cognitivecomputations/Dolphin3.0-R1-...
      - whiterabbitneo:33b-v1.5-q4_k_m    # updated to match new import name
      - dolphin-llama3:70b-q4_k_m         # dolphin-2.9.1-llama-3-70b (PULL_HEAVY)

  # ── Reasoning / Research / Data Analysis ──────────────────────────────────
  - id: ollama-reasoning
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: reasoning
    models:
      - deepseek-r1:32b-q4_k_m           # Primary: strong reasoning + chain-of-thought
      - dolphin-llama3:8b                 # Fast uncensored fallback
      - huihui_ai/tongyi-deepresearch-abliterated

  # ── Vision / Multimodal ──────────────────────────────────────────────────
  - id: ollama-vision
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: vision
    models:
      - qwen3-vl:32b   # FIX: was qwen3-omni:30b (does not exist in Ollama library)
      - llava:7b           # Fast: lightweight vision fallback

  # ── Creative (writing, storytelling) ────────────────────────────────────
  - id: ollama-creative
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: creative
    models:
      - dolphin-llama3:8b                # Uncensored, strong creative
      - huihui_ai/baronllm-abliterated   # No restrictions creative

  # ── FUTURE CLUSTER NODES ─────────────────────────────────────────────────
  # Uncomment and update URL as Mac Studios are added:
  # - id: ollama-node-2
  #   type: ollama
  #   url: "http://192.168.1.102:11434"
  #   group: general
  #   models: [dolphin-llama3:8b]

workspace_routing:
  auto:           [mlx, security, coding, general]  # Content-aware routing handles redirection; these are fallbacks
  auto-coding:    [mlx, coding, general]
  auto-security:  [security, general]
  auto-redteam:   [security, general]
  auto-blueteam:  [security, general]
  auto-creative:  [mlx, creative, general]
  auto-reasoning: [mlx, reasoning, general]
  auto-documents: [coding, general]
  auto-video:     [general]
  auto-music:     [general]
  auto-research:  [mlx, reasoning, general]
  auto-vision:    [vision, general]   # No MLX — vision models only on Ollama
  auto-data:      [mlx, reasoning, general]
  auto-compliance: [mlx, reasoning, general]  # NERC CIP gap analysis — MLX Qwen3.5-35B primary; reasoning group default (deepseek-r1:32b-q4_k_m) is Ollama fallback

defaults:
  fallback_group: general
  request_timeout: 120
  health_timeout: 3           # was: 10 — local backends respond in <1s; 3s survives cold Ollama starts
  health_check_interval: 15  # was: 30 — faster failover detection on single-node (not clusters)