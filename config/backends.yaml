# MTP speculative decoding is supported natively by models with embedded MTP heads
# (e.g. Qwopus3.6-27B-v2-MTP-GGUF, Jackrong). Enable per-request via
# draft_num_predict parameter in the Ollama Modelfile or API options.

# ── Embedding candidates (informational; not yet routed) ─────────────────
# These models are recorded for the future P5-FUT-EMBED-001 migration task.
# The current production embedding server (scripts/embedding-server.py on
# port 8917) runs microsoft/harrier-oss-v1-0.6b and is bound to the LanceDB
# index at /Volumes/data01/portal5_lance/. Swapping embeddings invalidates
# that index — re-ingestion of every RAG source is required.
#
# Do NOT route these models through portal_pipeline. They are tracked here
# so future Claude sessions do not propose them as if they were drop-ins.
embedding_candidates:
  - id: google/embeddinggemma-300M
    notes: "Google EmbeddingGemma 300M (~0.3GB, Gemma3 lineage, Aug 2025+).
      Best-in-class under 500M parameters. On the larger MTEB v2 field the
      incumbent Harrier family (27B tier MTEB v2 74.3) is competitive with
      Qwen3-Embedding-8B (70.58) — EmbeddingGemma's advantage is at the small
      end only. Migration is not a clear win; needs the shadow-index A/B to
      justify, given LanceDB re-ingestion cost. V8 corrected premise."
  - id: Qwen/Qwen3-Embedding-0.6B
    notes: "Qwen3-Embedding 0.6B (~0.6GB, Apache 2.0, Jun 2025). MTEB
      multilingual leaderboard #1 in <1B class. Same lineage as production
      Qwen3-Reranker-0.6B on :8925 — aligning embedding and reranker
      lineage is desirable for cross-encoder calibration. Already in
      MLX_MODELS pull list as mlx-community/Qwen3-Embedding-0.6B-4bit-DWQ
      (pre-positioned for future swap)."
  - id: Qwen/Qwen3-Embedding-8B
    notes: "Qwen3-Embedding 8B (~8GB, Apache 2.0). MTEB multilingual #1
      overall (70.58). Memory cost significant if loaded alongside an
      auto-coding MoE — likely too large for production. Bench-eval only."

# ── Pipeline-mode bench skip list ─────────────────────────────────────────
# Workspaces that exist in workspace_routing for routing/dispatch reasons
# but should NOT be exercised by bench_tps.py in pipeline mode. The
# bench_tps.py text-prompt harness cannot meaningfully exercise streaming
# ASR, TTS, or other audio-modality models — running them produces noise
# that pollutes the Grafana benchmarks dashboard.
#
# Mirrors the existing bench_skip: true flag on mlx_models[] entries
# (which excludes direct-mode benching). pipeline_bench_skip is the
# workspace-level analog.
#
# An explicit --workspace <id> filter on bench_tps.py overrides this list
# (operator wants to probe that specific workspace intentionally).
#
# Speech / audio-modality benches should be exercised by
# TASK_SPEECH_SHOOTOUT_V1.md (deferred — see P5_ROADMAP.md
# P5-FUT-SPEECH-002), which uses a dedicated audio-prompt driver, not
# bench_tps.py.
pipeline_bench_skip:
- bench-voxtral-realtime    # Mistral streaming ASR — audio-modality probe required
- bench-voxtral-tts         # Mistral TTS — audio-output probe required
- bench-granite-speech      # IBM ASR with keyword biasing — audio-modality probe required
