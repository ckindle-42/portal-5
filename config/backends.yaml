    notes: "Apriel-Nemotron-15b-Thinker Q5_K_M (~10GB, bartowski GGUF, ServiceNow AI + NVIDIA, Apache 2.0, 15B dense). Enterprise reasoning model with extended chain-of-thought thinking. Strong on code, math, and multi-step problem-solving. Smaller than 27B class — candidate for auto-reasoning fast-path if quality competitive. bench-apriel-nemotron target (TASK_MODEL_EVAL_V9_CANDIDATES). supports_tools=false (reasoning/thinking model; verify via --audit-tools before promotion)."
