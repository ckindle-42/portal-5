# Portal 5.0 — Backend Registry
# OPERATOR FILE: Edit this to add cluster nodes. No code changes needed.
# After editing: docker compose restart portal-pipeline

backends:
  # ── General (fast default, function calling, creative) ─────────────────────
  - id: ollama-general
    type: ollama
    url: "http://ollama:11434"
    group: general
    models:
      - dolphin-llama3:8b              # Default: fast, uncensored, strong function calling
      - llama3.2:3b-instruct-q4_K_M   # Ultra-fast fallback for routing

  # ── Coding (code generation, debugging, architecture) ─────────────────────
  - id: ollama-coding
    type: ollama
    url: "http://ollama:11434"
    group: coding
    models:
      - qwen3-coder-next:30b-q5                          # Best: agentic, Splunk/BigFix/PPT
      - hf.co/unsloth/GLM-4.7-Flash-GGUF                 # Fast MoE, PowerShell/C#/SQL
      - deepseek-coder:16b-instruct-q4_K_M               # Splunk SPL specialist
      - devstral:24b                                     # Agentic dev workflows

  # ── Security / Red Team / Blue Team ───────────────────────────────────────
  - id: ollama-security
    type: ollama
    url: "http://ollama:11434"
    group: security
    models:
      - hf.co/AlicanKiraz0/Cybersecurity-BaronLLM_Offensive_Security_LLM_Q6_K_GGUF  # Best: dedicated offensive
      - hf.co/segolilylabs/Lily-Cybersecurity-7B-v0.2-GGUF                           # Fast: balanced red/blue
      - xploiter/the-xploiter                                                          # Fast: pentest
      - hf.co/WhiteRabbitNeo/WhiteRabbitNeo-33B-v1.5-GGUF                           # Large: payload research
      - huihui_ai/baronllm-abliterated                                                # Uncensored general security
      - lazarevtill/Llama-3-WhiteRabbitNeo-8B-v2.0:q4_0                              # Fast: classic WRN

  # ── Reasoning / Research / Data Analysis ──────────────────────────────────
  - id: ollama-reasoning
    type: ollama
    url: "http://ollama:11434"
    group: reasoning
    models:
      - hf.co/deepseek-ai/DeepSeek-R1-32B-GGUF      # NEW: deep reasoning, ~16GB
      - huihui_ai/tongyi-deepresearch-abliterated:30b # Research synthesis
      - dolphin-llama3:8b                              # Fast fallback

  # ── Vision / Multimodal ──────────────────────────────────────────────────
  - id: ollama-vision
    type: ollama
    url: "http://ollama:11434"
    group: vision
    models:
      - qwen3-omni:30b    # Best: multimodal, vision + audio understanding
      - llava:7b           # Fast: lightweight vision fallback

  # ── Creative (writing, storytelling) ────────────────────────────────────
  - id: ollama-creative
    type: ollama
    url: "http://ollama:11434"
    group: creative
    models:
      - dolphin-llama3:8b                # Uncensored, strong creative
      - huihui_ai/baronllm-abliterated   # No restrictions creative

  # ── FUTURE CLUSTER NODES ─────────────────────────────────────────────────
  # Uncomment and update URL as Mac Studios are added:
  # - id: ollama-node-2
  #   type: ollama
  #   url: "http://192.168.1.102:11434"
  #   group: general
  #   models: [dolphin-llama3:8b]

workspace_routing:
  auto:           [general]
  auto-coding:    [coding, general]
  auto-security:  [security, general]
  auto-redteam:   [security, general]
  auto-blueteam:  [security, general]
  auto-creative:  [creative, general]
  auto-reasoning: [reasoning, general]
  auto-documents: [general]
  auto-video:     [general]
  auto-music:     [general]
  auto-research:  [reasoning, general]
  auto-vision:    [vision, general]
  auto-data:      [reasoning, general]

defaults:
  fallback_group: general
  request_timeout: 120
  health_timeout: 10
  health_check_interval: 30