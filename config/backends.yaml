  # responses. The general group (tongyi-deepresearch-abliterated, supergemma4) handles
  # Magistral strategy tasks without the budget-exhaustion failure mode.
  auto-math:       [mlx, coding, general]      # Qwen2.5-Math-7B primary; qwen3.5:9b Ollama fallback
