# Portal 6.0.4 — Backend Registry
# OPERATOR FILE: Edit this to add cluster nodes. No code changes needed.
# After editing: docker compose restart portal-pipeline

backends:
  # ── MLX — Apple Silicon native (20-40% faster than Ollama GGUF on M-series) ─
  # Requires: ./launch.sh install-mlx && ./launch.sh pull-mlx-models
  # Only ONE MLX server runs at a time (memory constraint). The pipeline automatically
  # switches between mlx_lm (text-only: Qwen3-Coder, DeepSeek, Devstral) and
  # mlx_vlm (VLM: Qwen3.5 family) based on the requested model.
  # Switching has ~30s load penalty on first request after switch.
  #
  # MEMORY: One model in memory at a time (~2-40GB depending on model).
  # Rule: MLX active weight + ComfyUI model + Ollama loaded models < (total RAM - 8GB OS)

  - id: mlx-apple-silicon
    type: mlx
    url: "${MLX_LM_URL:-http://host.docker.internal:8081}"
    group: mlx
    # mlx_models: canonical per-model metadata. cluster_backends.py auto-flattens
    # to `models: [id]` for routing. mlx-proxy.py reads memory_gb/big_model/is_vlm
    # for admission control. Add a model here — it appears everywhere automatically.
    # Fields:
    #   id:             full HuggingFace model path
    #   memory_gb:      estimated peak VRAM (weights + KV cache at default ctx)
    #   big_model:      true = requires full-evict load sequence (see BIG_MODEL_CTX)
    #   is_vlm:         true = requires mlx_vlm server (port 8082), false = mlx_lm
    #   supports_tools: true = model reliably handles OpenAI tools schema in mlx_lm
    mlx_models:
      # ── Text-only (mlx_lm, port 8081) ────────────────────────────────────────
      - id: mlx-community/Qwen3-Coder-Next-4bit
        memory_gb: 46
        big_model: true
        is_vlm: false
        supports_tools: true
        notes: "Primary coder: 80B MoE 4bit, 3B active (~46GB, 256k ctx, BIG_MODEL)"
      - id: mlx-community/Qwen3-Coder-30B-A3B-Instruct-8bit
        memory_gb: 22
        big_model: false
        is_vlm: false
        supports_tools: true
        notes: "Fast agentic coder: 30B MoE 8bit (~22GB)"
      - id: lmstudio-community/Devstral-Small-2507-MLX-4bit
        memory_gb: 15
        big_model: false
        is_vlm: false
        supports_tools: true
        notes: "Devstral v1.1 4bit (~15GB, 53.6% SWE-bench)"
      - id: huihui-ai/Huihui-GLM-4.7-Flash-abliterated-mlx-4bit
        memory_gb: 18
        big_model: false
        is_vlm: false
        supports_tools: true
        notes: "GLM-4.7-Flash 30B-A3B MoE 4bit (~18GB), 59.2% SWE-bench, abliterated, 200K ctx"
      - id: mlx-community/Dolphin3.0-Llama3.1-8B-8bit
        memory_gb: 9
        big_model: false
        is_vlm: false
        supports_tools: true
        notes: "Dolphin 8B uncensored (~9GB)"
      - id: mlx-community/Llama-3.2-3B-Instruct-8bit
        memory_gb: 3
        big_model: false
        is_vlm: false
        supports_tools: true
        notes: "Ultra-fast routing model (~3GB)"
      - id: mlx-community/phi-4-8bit
        memory_gb: 14
        big_model: false
        is_vlm: false
        supports_tools: true
        notes: "Microsoft Phi-4 14B (~14GB, MIT, synthetic data — distinct methodology)"
      - id: lmstudio-community/Magistral-Small-2509-MLX-8bit
        memory_gb: 24
        big_model: false
        is_vlm: false
        supports_tools: false
        notes: "Mistral reasoning 24B (~24GB, [THINK] mode — tool format differs from Qwen/Llama)"
      - id: mlx-community/Llama-3.3-70B-Instruct-4bit
        memory_gb: 40
        big_model: true
        is_vlm: false
        supports_tools: true
        notes: "Heavy coding + reasoning (~40GB, 4bit only — too big for 8bit, BIG_MODEL)"
      # ── Claude 4.6 Opus Reasoning Distilled (Jackrong) ────────────────────────
      - id: Jackrong/MLX-Qwopus3.5-27B-v3-8bit
        memory_gb: 22
        big_model: false
        is_vlm: false
        supports_tools: true
        notes: "Reasoning primary: 27B v3 8bit (~22GB, v3 structural alignment)"
      - id: Jackrong/MLX-Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2-4bit
        memory_gb: 14
        big_model: false
        is_vlm: false
        supports_tools: true
        notes: "Reasoning alt: 27B v2 4bit (~14GB, tighter CoT, Claude-4.6-Opus)"
      - id: Jackrong/MLX-Qwopus3.5-9B-v3-8bit
        memory_gb: 9
        big_model: false
        is_vlm: false
        supports_tools: true
        notes: "Available 9B slot (~9GB, v3)"
      - id: Jackrong/MLX-Qwen3.5-9B-Claude-4.6-Opus-Reasoning-Distilled-8bit
        memory_gb: 9
        big_model: false
        is_vlm: false
        supports_tools: true
        notes: "Available 9B Claude-4.6 slot (~9GB)"
      - id: Jackrong/MLX-Qwen3.5-35B-A3B-Claude-4.6-Opus-Reasoning-Distilled-8bit
        memory_gb: 28
        big_model: false
        is_vlm: false
        supports_tools: true
        notes: "Compliance: 35B MoE 8bit, 3B active (~28GB)"
      - id: mlx-community/DeepSeek-R1-Distill-Qwen-32B-MLX-8Bit
        memory_gb: 34
        big_model: false
        is_vlm: false
        supports_tools: true
        notes: "Data analysis: R1 Distill Qwen 32B 8bit (~34GB)"
      - id: mlx-community/DeepSeek-R1-Distill-Qwen-32B-abliterated-4bit
        memory_gb: 18
        big_model: false
        is_vlm: false
        supports_tools: true
        notes: "Uncensored reasoning: R1 Distill Qwen 32B 4bit (~18GB)"
      - id: mlx-community/Qwen2.5-Math-7B-Instruct-4bit
        memory_gb: 5
        big_model: false
        is_vlm: false
        supports_tools: true
        notes: "Math specialist: Qwen2.5-Math 7B 4bit (~5GB)"
      # ── Draft models for speculative decoding (loaded alongside target) ────────
      - id: mlx-community/Qwen2.5-0.5B-Instruct-4bit
        memory_gb: 0.5
        big_model: false
        is_vlm: false
        supports_tools: false
        notes: "Draft model: Qwen tokenizer (~0.5GB, additive with target)"
      - id: mlx-community/Llama-3.2-1B-Instruct-4bit
        memory_gb: 1.0
        big_model: false
        is_vlm: false
        supports_tools: false
        notes: "Draft model: Llama-3 tokenizer (~1GB, additive with target)"
      # ── VLM (mlx_vlm, port 8082 — auto-switched) ──────────────────────────────
      - id: mlx-community/gemma-4-31b-it-4bit
        memory_gb: 18
        big_model: false
        is_vlm: true
        supports_tools: false
        notes: "Primary VLM: Gemma 4 dense 31B 4bit (~18GB, thinking+vision, 256K ctx)"
      - id: mlx-community/Qwen3-VL-32B-Instruct-8bit
        memory_gb: 36
        big_model: true
        is_vlm: true
        supports_tools: false
        notes: "Heavy VLM: Qwen3-VL 32B 8bit (~36GB, BIG_MODEL)"
      - id: mlx-community/gemma-4-e4b-it-4bit
        memory_gb: 5
        big_model: false
        is_vlm: true
        supports_tools: false
        notes: "Gemma 4 E4B VLM fallback (~5GB, vision+audio, 128K ctx)"
      - id: Jiunsong/supergemma4-26b-abliterated-multimodal-mlx-4bit
        memory_gb: 15
        big_model: false
        is_vlm: true
        supports_tools: false
        notes: "Abliterated Gemma 4 26B A4B MoE (~15GB, uncensored vision, 256K ctx)"
      - id: lmstudio-community/Phi-4-reasoning-plus-MLX-4bit
        memory_gb: 8
        big_model: false
        is_vlm: false
        supports_tools: true
        notes: "Phi-4-reasoning-plus STEM/math (~8GB, RL-trained, mlx_lm not mlx_vlm)"
      - id: mlx-community/Llama-3.2-11B-Vision-Instruct-abliterated-4-bit
        memory_gb: 7
        big_model: false
        is_vlm: true
        supports_tools: false
        notes: "Uncensored VLM 11B 4bit (~7GB, Karakeep vision)"
      - id: dealignai/Gemma-4-31B-JANG_4M-CRACK
        memory_gb: 23
        big_model: false
        is_vlm: true
        supports_tools: false
        notes: "Abliterated Gemma 4 31B JANG v2 5.1-bit (~23GB, uncensored vision+text)"

  # ── General (fast default, function calling, creative) ─────────────────────
  - id: ollama-general
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: general
    models:
      - dolphin-llama3:8b              # Default: fast, uncensored, strong function calling
      - hf.co/QuantFactory/Llama-3.2-3B-Instruct-abliterated-GGUF  # Ultra-fast fallback (uncensored)

  # ── Coding (code generation, debugging, architecture) ─────────────────────
  - id: ollama-coding
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: coding
    models:
      - qwen3.5:9b
      - qwen3-coder:30b                             # 30B-A3B MoE (3B active), 19GB — primary Ollama coding fallback
      - deepseek-coder-v2:16b-lite-instruct-q4_K_M  # https://ollama.com/library/deepseek-coder-v2/tags
      - devstral:24b
      - glm-4.7-flash:q4_k_m             # was: hf.co/unsloth/GLM-4.7-Flash-GGUF
      - deepseek-coder-v2-lite:q4_k_m    # was: hf.co/deepseek-ai/DeepSeek-Coder-V2-Lite-Base-GGUF
      - llama3.3:70b-q4_k_m              # was: hf.co/meta-llama/Meta-Llama-3.3-70B-GGUF (PULL_HEAVY)

  # ── Security / Red Team / Blue Team ───────────────────────────────────────
  - id: ollama-security
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: security
    models:
      # ── Fast / always-available (native Ollama registry) ─────────────────
      - huihui_ai/baronllm-abliterated
      - xploiter/the-xploiter
      - lazarevtill/Llama-3-WhiteRabbitNeo-8B-v2.0:q4_0
      - deepseek-r1:32b-q4_k_m               # Threat modeling + defensive analysis (shared with reasoning)
      # ── Downloaded via huggingface-cli + imported ─────────────────────────
      - baronllm:q6_k                    # was: hf.co/AlicanKiraz0/Cybersecurity-BaronLLM_...
      - lily-cybersecurity:7b-q4_k_m     # imported by pull-models from segolilylabs/Lily-Cybersecurity-7B-v0.2-GGUF
      - dolphin3-r1-mistral:24b-q4_k_m   # was: hf.co/cognitivecomputations/Dolphin3.0-R1-...
      - whiterabbitneo:33b-v1.5-q4_k_m    # updated to match new import name
      - dolphin-llama3:70b-q4_k_m         # dolphin-2.9.1-llama-3-70b (PULL_HEAVY)

  # ── Reasoning / Research / Data Analysis ──────────────────────────────────
  - id: ollama-reasoning
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: reasoning
    models:
      - deepseek-r1:32b-q4_k_m           # Primary: strong reasoning + chain-of-thought
      - gpt-oss:20b                       # ~12GB — OpenAI open-weight MoE, o3-mini level, configurable thinking depth
      - dolphin-llama3:8b                 # Fast uncensored fallback
      - huihui_ai/tongyi-deepresearch-abliterated
      - supergemma4-26b-uncensored:q4_k_m  # Gemma 4 26B A4B MoE uncensored GGUF (~17GB, tool-use, reasoning, Google lineage) — imported from hf.co/Jiunsong/supergemma4-26b-uncensored-gguf-v2

  # ── Vision / Multimodal ──────────────────────────────────────────────────
  - id: ollama-vision
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: vision
    models:
      - qwen3-vl:32b   # FIX: was qwen3-omni:30b (does not exist in Ollama library)
      - llava:7b           # Fast: lightweight vision fallback

  # ── Creative (writing, storytelling) ────────────────────────────────────
  - id: ollama-creative
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: creative
    models:
      - dolphin-llama3:8b                # Uncensored, strong creative
      - hermes3:8b                      # NousResearch, long-form narrative coherence + character consistency
      - huihui_ai/baronllm-abliterated   # No restrictions creative

  # ── FUTURE CLUSTER NODES ─────────────────────────────────────────────────
  # Uncomment and update URL as Mac Studios are added:
  # - id: ollama-node-2
  #   type: ollama
  #   url: "http://192.168.1.102:11434"
  #   group: general
  #   models: [dolphin-llama3:8b]

workspace_routing:
  auto:           [mlx, security, coding, general]  # Content-aware routing handles redirection; these are fallbacks
  auto-coding:    [mlx, coding, general]
  auto-agentic:   [mlx, coding, general]
  auto-spl:       [mlx, coding, general]
  auto-security:  [security, general]
  auto-redteam:   [security, general]
  auto-blueteam:  [security, general]
  auto-creative:  [mlx, creative, general]
  auto-reasoning: [mlx, reasoning, general]
  auto-documents: [mlx, coding, general]  # MLX Phi-4-8bit primary; qwen3.5:9b fallback
  auto-video:     [general]
  auto-music:     [general]
  auto-research:  [mlx, reasoning, general]
  auto-vision:    [mlx, vision, general]   # MLX gemma-4-31b-it-4bit primary; Ollama qwen3-vl:32b fallback
  auto-data:      [mlx, reasoning, general]
  auto-compliance: [mlx, reasoning, general]  # NERC CIP gap analysis — MLX Qwen3.5-35B primary; reasoning group default (deepseek-r1:32b-q4_k_m) is Ollama fallback
  auto-mistral:    [mlx, reasoning, general]   # Magistral-Small dedicated reasoning — Mistral training lineage
  auto-math:       [mlx, coding, general]      # Qwen2.5-Math-7B primary; qwen3.5:9b Ollama fallback
  # ── Coding Capability Benchmark Workspaces ──────────────────────────────
  # User-selected only. Each workspace is pinned to one model.
  # If MLX cannot load the target model, abort the benchmark run — do not
  # compare against a fallback. Fallback groups listed for graceful degradation
  # only; the bench persona description warns users to verify model loaded.
  bench-devstral:          [mlx, coding, general]   # Devstral-Small-2507 (Mistral/Codestral)
  bench-qwen3-coder-next:  [mlx, coding, general]   # Qwen3-Coder-Next-4bit (Alibaba, 80B MoE)
  bench-qwen3-coder-30b:   [mlx, coding, general]   # Qwen3-Coder-30B-A3B-8bit (Alibaba, 30B MoE)
  bench-llama33-70b:       [mlx, coding, general]   # Llama-3.3-70B-4bit (Meta)
  bench-phi4:              [mlx, coding, general]   # Phi-4-8bit (Microsoft)
  bench-phi4-reasoning:    [mlx, coding, general]   # Phi-4-reasoning-plus (Microsoft RL)
  bench-dolphin8b:         [mlx, general]           # Dolphin3.0-Llama3.1-8B (Cognitive Computations)
  bench-glm:               [coding, general]        # glm-4.7-flash (Zhipu AI — Ollama only)
  bench-gptoss:            [reasoning, general]     # gpt-oss:20b (OpenAI open-weight — Ollama only)

defaults:
  fallback_group: general
  request_timeout: 120
  health_timeout: 3           # was: 10 — local backends respond in <1s; 3s survives cold Ollama starts
  health_check_interval: 15  # was: 30 — faster failover detection on single-node (not clusters)

# ── Speculative Decoding (M4 Track 1) ────────────────────────────────────────
# Maps target_model_id → draft_model_id. Both must be in the MLX models list.
# When the target is loaded by mlx-proxy, --draft-model is appended to the
# server command. Speculative decoding requires tokenizer compatibility — only
# same-family pairs.
speculative_decoding:
  draft_models:
    # Qwen family (Qwen tokenizer)
    "mlx-community/Qwen3-Coder-30B-A3B-Instruct-8bit": "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
    "mlx-community/DeepSeek-R1-Distill-Qwen-32B-MLX-8Bit": "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
    "mlx-community/DeepSeek-R1-Distill-Qwen-32B-abliterated-4bit": "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
    "Jackrong/MLX-Qwopus3.5-27B-v3-8bit": "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
    "Jackrong/MLX-Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2-4bit": "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
    "Jackrong/MLX-Qwen3.5-35B-A3B-Claude-4.6-Opus-Reasoning-Distilled-8bit": "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
    # Llama family (Llama-3 tokenizer)
    "mlx-community/Llama-3.3-70B-Instruct-4bit": "mlx-community/Llama-3.2-1B-Instruct-4bit"
    "mlx-community/Dolphin3.0-Llama3.1-8B-8bit": "mlx-community/Llama-3.2-1B-Instruct-4bit"
    # Excluded: Qwen3-Coder-Next-4bit (no Qwen3-Coder draft model available)
    # Excluded: Mistral/Magistral (no small Mistral draft in MLX yet)