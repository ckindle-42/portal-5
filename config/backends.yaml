- id: ollama-reasoning
  type: ollama
  url: ${OLLAMA_URL:-http://host.docker.internal:11434}
  group: reasoning
  models:
  - id: deepseek-r1:32b-q4_k_m
    supports_tools: false
    notes: "Primary: strong reasoning + chain-of-thought. Reasoning-trained, not tool-trained\
      \ \u2014 supports_tools intentionally false to prevent reasoning-budget exhaustion\
      \ mixing with tool-call rendering."
  - id: gpt-oss:20b
    supports_tools: false
    notes: "~12GB \u2014 OpenAI open-weight MoE, o3-mini level, configurable thinking\
      \ depth, designed for agent/tool use. supports_tools set to false: --audit-tools\
      \ 2026-05-14 returned text_only (no tool_call emitted despite model card claims)."
  - id: granite4.1:8b
    supports_tools: true
    notes: "REPLACES dolphin-llama3:8b at this fallback position (TASK_TOOL_SUPPORT_AUDIT_V1\
      \ \xA7A11). Granite 4.1 8B is tool-tagged (BFCL V3 68.27); dolphin-llama3:8b\
      \ is not. Dolphin retained in ollama-general line 2 for model_hint continuity."
  - id: huihui_ai/tongyi-deepresearch-abliterated
    supports_tools: true
    notes: Verified tool-capable via --audit-tools 2026-05-04 (emitted tool_call).
      Abliterated Qwen3.5-abliterated lineage; tools tag confirmed.
  - id: supergemma4-26b-uncensored:q4_k_m
    supports_tools: true
    notes: Gemma 4 26B A4B MoE uncensored GGUF (~17GB, tool-use, reasoning, Google
      lineage)
  - id: granite4.1:30b
    supports_tools: true
    notes: "IBM Granite 4.1 30B Q4_K_M (~17GB, 128K ctx, dense, no-think) \u2014 leaderboard\
      \ #1 BFCL V3 (73.7) + IFEval 89.7. Apache 2.0, ISO-certified, cryptographic\
      \ signatures. IBM Research lineage."
