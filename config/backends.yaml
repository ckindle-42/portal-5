      \ Text2CAD 29.29 — strongest text->CAD model found in the 2026-06 HF+Ollama sweep, and the\
      \ real promotion target FOR auto-cad once a GGUF exists. BLOCKER: HF repo is Safetensors/\
      \ BF16 only, no GGUF, not deployed by any inference provider — NOT pullable into the\
      \ Ollama chat tier as-is. To activate: llama.cpp convert_hf_to_gguf.py + quantize from BF16,\
      \ then ollama create; replace this id with the real GGUF tag in a separate operator task\
      \ (see post-task note 5). Do NOT wire to a workspace while this placeholder id stands —\
      \ the model_hint would not resolve. NOT the MIT/Doris image->CAD VLM of the same name\
      \ (arXiv 2505.14646). Recorded additive-only per verify-before-recommend."
