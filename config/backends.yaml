  bench-qwen36-27b:        [mlx, coding, general]   # froggeric/Qwen3.6-27B-MLX-4bit (Alibaba, dense 27B + vision, ~16GB)
  bench-qwen36-35b-a3b:    [mlx, coding, general]   # mlx-community/Qwen3.6-35B-A3B-4bit (Alibaba MoE 3B active, ~20GB)
  bench-omnicoder2:        [coding, general]        # omnicoder2:9b-q4_k_m (Qwen3.5-9B SFT on agentic traces, Ollama only)
