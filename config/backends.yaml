  auto-reasoning: [mlx, reasoning, general]
  auto-documents: [mlx, coding, general]  # MLX Phi-4-8bit primary; qwen3.5:9b fallback
  auto-video:     [general]
  auto-music:     [general]
  auto-research:  [mlx, reasoning, general]
  auto-vision:    [mlx, vision, general]   # MLX gemma-4-31b-it-4bit primary; Ollama qwen3-vl:32b fallback
  auto-data:      [mlx, reasoning, general]
