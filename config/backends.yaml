  bench-phi4:              [mlx, coding, general]   # Phi-4-8bit (Microsoft)
  bench-phi4-reasoning:    [mlx, coding, general]   # Phi-4-reasoning-plus (Microsoft RL)
  bench-dolphin8b:         [mlx, general]           # Dolphin3.0-Llama3.1-8B (Cognitive Computations)
