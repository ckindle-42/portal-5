  bench-laguna:            [mlx, coding, general]   # Laguna-XS.2-4bit (Poolside — new lineage)
  bench-granite41-8b:      [general]                # granite4.1:8b (IBM, dense 8B no-think — Ollama only)
  bench-granite41-30b:     [reasoning, general]     # granite4.1:30b (IBM, dense 30B no-think — Ollama only)
