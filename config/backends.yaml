    notes: PRIMARY general uncensored fallback (TASK_QUANT_TRUEUP_V1 B.2) — gen 3.6 parity with the planned MLX-side refresh.
      Qwen3.6 35B-A3B MoE abliterated (~20GB Q4, Apache 2.0). Lineage successor to huihui_ai/qwen3.5-abliterated:9b. MoE 3B
      active — fast decode, larger uncensored fallback for AUTO. Same author lineage as baronllm-abliterated and tongyi-deepresearch-abliterated.
      supports_tools=true per Qwen3.6 family tool-tagging (verify with --audit-tools before workspace promotion).
  - id: huihui_ai/qwen3.5-abliterated:9b
    supports_tools: true
    notes: Qwen3.5 9B abliterated (~6.6GB Q4, 256K ctx, vision+tools+thinking tags). Demoted — superseded by Qwen3.6 line
      1; retained as smaller/faster 9B option. Active maintenance (huihui-ai). Previously primary for general fallback path.
  - id: dolphin-llama3:8b
    supports_tools: false
    notes: Dolphin 3.0 Llama 3.1 8B (~6GB Q4_K_M, 128K ctx). RETAINED for AUTO + auto-creative + auto-music model_hint resolution
      and persona suggested_model continuity. NOT tool-capable in Ollama (template lacks .Tools); see commit de96984 and TASK_TOOL_SUPPORT_AUDIT_V1
      §0.
  - id: hf.co/QuantFactory/Llama-3.2-3B-Instruct-abliterated-GGUF
    supports_tools: false
    notes: Ultra-fast 3B abliterated fallback. Stock Llama-3.2-3B template doesn't declare .Tools; abliterated GGUF inherits.
  - id: granite4.1:8b
    supports_tools: true
    notes: IBM Granite 4.1 8B Q4_K_M (~5.3GB, 128K ctx, dense, no-think) — verified tools tag, BFCL V3 68.27, IFEval 87.1.
      Apache 2.0, ISO-certified. Used as auto-video primary (de96984).
  - id: gemma4:26b-a4b-it-q4_K_M
    supports_tools: true
    notes: Gemma 4 26B A4B MoE VLM Q4 (~17GB, Apache 2.0, thinking+vision). Retained as fallback; QAT variant promoted to
      auto-daily primary.
  - id: gemma4:26b-a4b-it-qat
    supports_tools: true
    notes: 'Gemma 4 26B A4B QAT (~15GB, Apache 2.0, 256K ctx, vision+text, QAT near-BF16 quality at same ~15GB footprint).
      Promoted to auto-daily primary (V8: +23% TPS vs q4_K_M, same memory, near-BF16 quality). Also in ollama-vision for bench-gemma4-26b-qat.'
