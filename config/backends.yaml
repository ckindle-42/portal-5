      \ bench-phi4-mini target (TASK_MODEL_REFRESH_V8 A6).\
      \ supports_tools=true per official model card."
  - id: lfm2.5:8b
    supports_tools: true
    notes: "Liquid AI LFM2.5-8B-A1B (June 2026, Apache 2.0, ~5GB Q4, 128K ctx).\
      \ Hybrid architecture: gated short convolutions + grouped-query attention (NOT\
      \ a pure transformer). 8.3B total / 1.5B active MoE. Fastest in class on CPU.\
      \ ONLY non-transformer model in fleet — unique architecture diversity.\
      \ Recommended for: agentic workflows, tool use, structured outputs, multilingual.\
      \ NOT recommended for: heavy code generation or knowledge-only tasks.\
      \ bench-lfm25-8b target (TASK_MODEL_REFRESH_V8 A8).\
      \ supports_tools=true per LFM2.5 function-calling format."
