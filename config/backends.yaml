      via hf.co route (magistral:24b-small-2509-q8_0 tag not in Ollama registry). Replaces 2506 entry (TASK_MODEL_FLEET_REFRESH_V2
      Phase 2). Template has [AVAILABLE_TOOLS] format but Ollama tool dispatch does not fire — model reasons about tools in
      prose instead of generating tool_calls (verified TV-04 + direct API test, TASK_TOOL_AUDIT_V2). Kept false.
  - id: hf.co/mradermacher/gemma-4-26B-A4B-it-uncensored-heretic-GGUF:gemma-4-26B-A4B-it-uncensored-heretic.Q4_K_M.gguf
    supports_tools: false
    notes: Gemma 4 26B heretic uncensored Q4 (~17GB, auto-creative primary).
  - id: gemma4:31b-it-q4_K_M
    supports_tools: false
    notes: Gemma 4 31B dense VLM Q4 (~20GB, Apache 2.0, research primary). QAT upgrade candidate at bench-gemma4-31b-qat.
  - id: hf.co/unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q4_K_XL
    supports_tools: true
    notes: Qwen3.6-35B-A3B UD-Q4_K_XL (~22GB, Unsloth Dynamic 2.0, MoE 3B active, 23 TPS). Also in ollama-coding.
  - id: portal5/gemma4-12b:q4_K_M-ctx8k
    supports_tools: true
    notes: Gemma 4 12B Q4_K_M ctx8k (~7.6GB, Google). gemma4:12b-it-q4_K_M + num_ctx 8192 modelfile cap — base model has 262K
      ctx which inflates KV cache and kills TPS.
  - id: phi4-mini
    supports_tools: true
    notes: 'Microsoft Phi-4-Mini (Feb 2025, MIT, 3.8B, ~2.5GB Q4, 128K ctx). Synthetic-data training: multilingual, function
      calling, reasoning, math. Outperforms Llama 3.2 3B and Qwen 2.5 3B on reasoning/math. Ultra-lightweight daily fallback
      candidate. bench-phi4-mini target (TASK_MODEL_REFRESH_V8 A6). supports_tools=true per official model card.'
  - id: lfm2.5:8b
    supports_tools: true
    notes: 'Liquid AI LFM2.5-8B-A1B (June 2026, Apache 2.0, ~5GB Q4, 128K ctx). Hybrid architecture: gated short convolutions
      + grouped-query attention (NOT a pure transformer). 8.3B total / 1.5B active MoE. Fastest in class on CPU. ONLY non-transformer
      model in fleet — unique architecture diversity. Recommended for: agentic workflows, tool use, structured outputs, multilingual.
      NOT recommended for: heavy code generation or knowledge-only tasks. bench-lfm25-8b target (TASK_MODEL_REFRESH_V8 A8).
      supports_tools=true per LFM2.5 function-calling format.'
  - id: mistral-small3.2:24b
    supports_tools: true
    notes: Mistral Small 3.2 (June 2025, Apache 2.0, 24B, ~14GB Q4). Improved function calling and instruction following over
      Small 3.1. auto-mistral lane candidate. bench-mistral-small32 target (TASK_MODEL_REFRESH_V8 A14). supports_tools=true
      per Mistral function-calling format; verify via --audit-tools.
  - id: gemma4:e4b-it-q4_K_M
    supports_tools: true
    notes: 'Gemma 4 E4B MoE (~9.6GB, Google, 4B active, 128K ctx, VLM+thinking+audio). Daily-driver candidate bench. audit-tools
      2026-06-18: tool_call confirmed.'
  - id: hf.co/mradermacher/Huihui-Qwen3.6-35B-A3B-abliterated-GGUF:Q4_K_M
    supports_tools: false
    notes: 'Huihui-Qwen3.6-35B-A3B abliterated Q4_K_M (~20GB, mradermacher, MoE 3B active). Speed play — 3B active parameters
      for fast decode. Same huihui-ai abliteration lineage. bench-huihui-qwen36-35b-a3b target. Was vanch007 (HF repo deleted);
      moved to mradermacher (same base, confirmed Q4_K_M file). Pull: ollama pull hf.co/mradermacher/Huihui-Qwen3.6-35B-A3B-abliterated-GGUF:Q4_K_M'
