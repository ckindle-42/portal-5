# Portal 5.0 — Backend Registry Configuration
# This file defines Ollama/vLLM backends and their workspace routing.

backends:
  # ── Local Ollama (M4 Mac or any single-node setup) ─────────────────────────
  - id: local-ollama
    type: ollama
    url: "http://host.docker.internal:11434"
    group: general          # Used for workspace routing
    models:
      - dolphin-llama3:8b   # Default fast model
      - llama3.1:8b         # Alternative

# Workspace → Group(s) routing map
workspace_routing:
  auto:              [general]
  auto-coding:       [coding, general]
  auto-document:     [general]
  auto-security:     [general]
  auto-images:       [general]
  auto-creative:     [creative, general]
  auto-documents:    [general]
  auto-video:        [general]
  auto-music:        [general]
  auto-research:     [general]

# Defaults
defaults:
  fallback_group: general
