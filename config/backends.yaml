      \ NeurIPS 2025 poster, arXiv 2505.19713, hf.co/gudo7208/CAD-Coder). Qwen2.5-7B-Instruct\
      \ base, two-stage SFT + GRPO with a CAD geometric reward (Chamfer Distance + format);\
