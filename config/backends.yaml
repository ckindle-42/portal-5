    notes: "Qwopus3.6-27B-Coder-MTP Q5_K_M (~19GB, Jackrong, Apache 2.0, June 2026). Coder SFT on Qwopus3.6-27B-v2 (Qwen3.6-27B base + Trace Inversion). Agentic coding + tool-use training on Claude Opus traces + hermes-agent-reasoning trajectories. SWE-bench Verified 67.0% (thinking-off, Q5_K_M). MTP embedded heads for speculative self-decoding. 27B dense, ~19GB, 32K native fine-tune ctx (RoPE/YaRN for longer). Note: hf.co/Jackrong/Qwopus3.6-27B-v2-MTP-GGUF (the base reasoning repo) had pull failures 2026-06-09 — this is a separate Coder-specific GGUF repo with llama.cpp tags; verify pull succeeds before noting as operational. bench-qwopus-coder-mtp target (TASK_MODEL_EVAL_V9_CANDIDATES). supports_tools=true per Qwen3.6 tool-call format inherited by Qwopus; verify via --audit-tools before promotion."
