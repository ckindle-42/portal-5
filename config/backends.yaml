  - id: portal5/gemma4-12b:q4_K_M-ctx8k
    supports_tools: true
    notes: "Gemma 4 12B Q4_K_M ctx8k (~7.6GB, Google). gemma4:12b-it-q4_K_M + num_ctx 8192 modelfile cap — base model has 262K ctx which inflates KV cache and kills TPS."
