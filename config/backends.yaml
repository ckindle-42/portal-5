  url: ${OLLAMA_URL:-http://host.docker.internal:11434}
  group: coding
  models:
  - id: qwen3.5:9b
    supports_tools: true
  - id: qwen3-coder:30b
    supports_tools: true
    notes: "30B-A3B MoE (3B active), 19GB \u2014 primary Ollama coding fallback"
  - id: omnicoder2:9b-q4_k_m
    supports_tools: false
    notes: V6 bench candidate (TASK_MODEL_REFRESH_V6). OmniCoder-2 9B Q4_K_M (~5.7GB,
      Apache 2.0). Qwen3.5-9B base, SFT on 425K agentic trajectories from Claude Opus
      4.6 / GPT-5.4 / Codex / Gemini 3.1 Pro. v2 fixes v1's repetition loops, bloated
      thinking, agentic-loop instability. Installed as omnicoder2:9b-q4_k_m (Ollama
      registry alias). supports_tools=false until verified via tests/portal5_persona_matrix.py
      --audit-tools.
  - id: deepseek-coder-v2:16b-lite-instruct-q4_K_M
    supports_tools: false
    notes: Older Coder V2, no Ollama tools tag verified
  - id: devstral:24b
    supports_tools: true
    notes: Mistral devstral-small-2, tool-using coding agent
  - id: llama3.3:70b-q4_k_m
    supports_tools: false
    notes: "was: hf.co/meta-llama/Meta-Llama-3.3-70B-GGUF (PULL_HEAVY) \u2014 verified\
      \ NO Ollama tools tag on this GGUF (audit 2026-05-04: api_error). Llama 3.3\
      \ architecture supports tools natively, but this specific Ollama registry GGUF\
      \ lacks the template declaration."
