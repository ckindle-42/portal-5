  request_timeout: 300
embedding_candidates:
- id: google/embeddinggemma-300M
  notes: Google EmbeddingGemma 300M (~0.3GB, Gemma3 lineage, Aug 2025+). Best-in-class under 500M parameters. On the larger
    MTEB v2 field the incumbent Harrier family (27B tier MTEB v2 74.3) is competitive with Qwen3-Embedding-8B (70.58) — EmbeddingGemma's
    advantage is at the small end only. Migration is not a clear win; needs the shadow-index A/B to justify, given LanceDB
    re-ingestion cost. V8 corrected premise.
- id: Qwen/Qwen3-Embedding-0.6B
  notes: 'Qwen3-Embedding 0.6B (~0.6GB, Apache 2.0, Jun 2025). MTEB multilingual leaderboard #1 in <1B class. Same lineage
    as production Qwen3-Reranker-0.6B on :8925 — aligning embedding and reranker lineage is desirable for cross-encoder calibration.
    Already in MLX_MODELS pull list as mlx-community/Qwen3-Embedding-0.6B-4bit-DWQ (pre-positioned for future swap).'
- id: Qwen/Qwen3-Embedding-8B
  notes: 'Qwen3-Embedding 8B (~8GB, Apache 2.0). MTEB multilingual #1 overall (70.58). Memory cost significant if loaded alongside
    an auto-coding MoE — likely too large for production. Bench-eval only.'
