# Portal 5.0 — Backend Registry
# OPERATOR FILE: Edit this to add cluster nodes. No code changes needed.
# After editing: docker compose restart portal-pipeline

backends:
  # ── MLX — Apple Silicon native (20-40% faster than Ollama GGUF on M-series) ─
  # Requires: ./launch.sh install-mlx && ./launch.sh pull-mlx-models
  # mlx_lm serves ONE model at a time — set MLX_MODEL in .env to switch
  # When mlx_lm is not running, router falls through to Ollama automatically
  - id: mlx-apple-silicon
    type: mlx
    url: "${MLX_URL:-http://host.docker.internal:8081}"
    group: mlx
    models:
      # ── Coding (primary — best for Splunk, BigFix, PowerShell, Python) ────
      - mlx-community/Qwen3-Coder-Next-4bit              # Primary: 80B MoE (~18GB active, 256k ctx)
      - mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit  # Fast: 30B agentic coder (~17GB)
      - mlx-community/Qwen3.5-35B-A3B-4bit               # New: 35B MoE, SWE-Bench ~76% (~20GB)
      - mlx-community/DeepSeek-Coder-V2-Lite-Instruct-4bit-mlx  # SPL specialist (~9GB)
      - mlx-community/Devstral-Small-2505-4bit            # Agentic dev workflows (~13GB)
      # ── Reasoning / Research ──────────────────────────────────────────────
      - mlx-community/DeepSeek-R1-0528-4bit               # Deep reasoning (~18GB)
      - mlx-community/Qwen3.5-27B-4bit                    # Balanced reasoning + coding (~15GB)
      # ── General / Creative ────────────────────────────────────────────────
      - mlx-community/Llama-3.2-3B-Instruct-4bit          # Ultra-fast routing + quick tasks
      # ── Heavy (unload others first on 64GB) ──────────────────────────────
      - mlx-community/Llama-3.3-70B-Instruct-4bit         # ~40GB — heavy coding + reasoning
      # ── NOT INCLUDED (reasons): ───────────────────────────────────────────
      # mlx-community/MiniMax-M2-4bit      → 129GB, doesn't fit in 64GB
      # BaronLLM, WhiteRabbitNeo, Lily     → No MLX versions exist, use Ollama GGUF
      # Dolphin3.0-R1-Mistral-24B MLX      → Community fork only, use Ollama GGUF

  # ── General (fast default, function calling, creative) ─────────────────────
  - id: ollama-general
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: general
    models:
      - dolphin-llama3:8b              # Default: fast, uncensored, strong function calling
      - llama3.2:3b-instruct-q4_K_M   # Ultra-fast fallback for routing

  # ── Coding (code generation, debugging, architecture) ─────────────────────
  - id: ollama-coding
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: coding
    models:
      # REMOVED: hf.co/Qwen/Qwen3-Coder-Next-GGUF  (sharded GGUF, Ollama incompatible)
      # REMOVED: qwen3-coder-next:30b-q5            (missing tensor blk.0.ssm_in.weight)
      # Use MLX backend instead: ./launch.sh install-mlx
      - qwen3.5:9b                                       # New: fast dense model, 8-12GB, 30-50 t/s on M4
      - hf.co/unsloth/GLM-4.7-Flash-GGUF                 # Fast MoE, PowerShell/C#/SQL
      - hf.co/deepseek-ai/DeepSeek-Coder-V2-Lite-Base-GGUF  # Lightning: Splunk SPL specialist (~8GB)
      - deepseek-coder:16b-instruct-q4_K_M               # Fast: Splunk SPL fallback
      - devstral:24b                                     # Agentic dev workflows
      - hf.co/MiniMaxAI/MiniMax-M2.1-GGUF               # Large: multi-file BigFix + presentation scripting (~22GB)
      - hf.co/meta-llama/Meta-Llama-3.3-70B-GGUF        # Heavy: coding + reasoning + tech writing (~38GB, PULL_HEAVY) — better than 3.1 for code
      # ── WATCH: Qwen3.5 MoE series (Feb-March 2026 — validate before adding) ──
      # - qwen3.5:35b-a3b     # 35B MoE, 3B active, SWE-Bench ~76% claimed — wait for stable Ollama tag
      # - qwen3.5:27b         # 27B dense — skip, 9B and 35B MoE cover this tier better

  # ── Security / Red Team / Blue Team ───────────────────────────────────────
  - id: ollama-security
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: security
    models:
      # ── Fast / always-available first (native Ollama registry) ───────────
      - huihui_ai/baronllm-abliterated                                                # Fast: uncensored, no HF auth needed (~5GB)
      - xploiter/the-xploiter                                                          # Fast: pentest specialist (~5GB)
      - lazarevtill/Llama-3-WhiteRabbitNeo-8B-v2.0:q4_0                              # Fast: classic WRN (~5GB)
      # ── Specialist models (require HF SSH key + pull) ────────────────────
      - hf.co/AlicanKiraz0/Cybersecurity-BaronLLM_Offensive_Security_LLM_Q6_K_GGUF  # Best: dedicated offensive (~18GB)
      - hf.co/segolilylabs/Lily-Cybersecurity-7B-v0.2-GGUF                           # Balanced red/blue (~4GB)
      - hf.co/cognitivecomputations/Dolphin3.0-R1-Mistral-24B-GGUF                   # Uncensored R1-style CoT (~14GB)
      - hf.co/WhiteRabbitNeo/WhiteRabbitNeo-33B-v1.5-GGUF                           # Large: payload research (~18GB)
      - hf.co/cognitivecomputations/dolphin-3-llama3-70b-GGUF                        # Heavy (~35GB, PULL_HEAVY)

  # ── Reasoning / Research / Data Analysis ──────────────────────────────────
  - id: ollama-reasoning
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: reasoning
    models:
      - dolphin-llama3:8b                                # Fast fallback — always available
      - huihui_ai/tongyi-deepresearch-abliterated:30b    # Research synthesis
      - hf.co/deepseek-ai/DeepSeek-R1-32B-GGUF          # Deep reasoning (~16GB, needs HF auth)

  # ── Vision / Multimodal ──────────────────────────────────────────────────
  - id: ollama-vision
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: vision
    models:
      - qwen3-vl:32b   # FIX: was qwen3-omni:30b (does not exist in Ollama library)
      - llava:7b           # Fast: lightweight vision fallback

  # ── Creative (writing, storytelling) ────────────────────────────────────
  - id: ollama-creative
    type: ollama
    url: "${OLLAMA_URL:-http://host.docker.internal:11434}"
    group: creative
    models:
      - dolphin-llama3:8b                # Uncensored, strong creative
      - huihui_ai/baronllm-abliterated   # No restrictions creative

  # ── FUTURE CLUSTER NODES ─────────────────────────────────────────────────
  # Uncomment and update URL as Mac Studios are added:
  # - id: ollama-node-2
  #   type: ollama
  #   url: "http://192.168.1.102:11434"
  #   group: general
  #   models: [dolphin-llama3:8b]

workspace_routing:
  auto:           [mlx, security, coding, general]  # Content-aware routing handles redirection; these are fallbacks
  auto-coding:    [mlx, coding, general]
  auto-security:  [security, general]
  auto-redteam:   [security, general]
  auto-blueteam:  [security, general]
  auto-creative:  [mlx, creative, general]
  auto-reasoning: [mlx, reasoning, general]
  auto-documents: [coding, general]
  auto-video:     [general]
  auto-music:     [general]
  auto-research:  [mlx, reasoning, general]
  auto-vision:    [vision, general]   # No MLX — vision models only on Ollama
  auto-data:      [mlx, reasoning, general]

defaults:
  fallback_group: general
  request_timeout: 120
  health_timeout: 10
  health_check_interval: 30