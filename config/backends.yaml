defaults:
  fallback_group: general
  request_timeout: 120
  health_timeout: 3           # was: 10 — local backends respond in <1s; 3s survives cold Ollama starts
  health_check_interval: 15  # was: 30 — faster failover detection on single-node (not clusters)

# ── Speculative Decoding (M4 Track 1) ────────────────────────────────────────
# Maps target_model_id → draft_model_id. Both must be in the MLX models list.
# When the target is loaded by mlx-proxy, --draft-model is appended to the
# server command. Speculative decoding requires tokenizer compatibility — only
# same-family pairs.
speculative_decoding:
  # DISABLED — mlx_lm 0.31.2 changed default cache to ArraysCache which is not trimmable.
  # Speculative decoding requires a trimmable cache. Re-enable when mlx_lm fixes this.
  # See: https://github.com/ml-explore/mlx-lm/issues (v0.31.2 regression)
  draft_models: {}