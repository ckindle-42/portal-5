  - id: qwen3.6:27b-mtp-q4_K_M
    supports_tools: true
    notes: "Qwen3.6-27B MTP Q4_K_M (~19GB, Alibaba, embedded MTP draft heads). Draft model for portal5/qwen3.6-27b-mtp:q8_0-drafted (TASK_MODEL_FLEET_REFRESH_V2 Phase 5). Pull: ollama pull qwen3.6:27b-mtp-q4_K_M before running ./launch.sh apply-mtp-drafts."
  - id: portal5/qwen3.6-27b-mtp:q8_0-drafted
    supports_tools: true
    notes: "Created by ./launch.sh apply-mtp-drafts (TASK_MODEL_FLEET_REFRESH_V2 Phase 5). q8_0 base + mtp-q4_K_M draft via DRAFT directive. bench-qwen36-27b-mtp Phase-6 A/B target. NOT pre-pulled — run apply-mtp-drafts to create."
  - id: olmo-3.1:32b-think
    supports_tools: false
    notes: "OLMo 3.1 32B Think (Allen AI, Dec 2025, Apache 2.0, ~19GB Q4). Fully\
      \ transparent Western-provenance model (Dolma 3 + Dolci datasets). Chain-of-thought\
      \ reasoning competitive with Qwen3-32B per AI2 evals. Only non-Qwen/non-DeepSeek\
      \ 32B reasoning model in fleet. Wires pre-existing bench-olmo3-32b workspace\
      \ (TASK_MODEL_REFRESH_V8 A13). supports_tools=false (reasoning model)."
  - id: phi4-mini-reasoning
    supports_tools: false
    notes: "Microsoft Phi-4-Mini-Reasoning (2025, MIT, 3.8B, ~2.5GB Q4, 128K ctx).\
      \ RL-trained for math, formal proofs, symbolic computation. Beats 7B models\
      \ on AIME/MATH-500/GPQA at 3.8B. bench-phi4-mini-reasoning target\
      \ (TASK_MODEL_REFRESH_V8 A7). supports_tools=false (math reasoning specialist)."
  - id: "hf.co/unsloth/DeepSeek-R1-0528-Qwen3-8B-GGUF:Q4_K_XL"
    supports_tools: false
    notes: "DeepSeek-R1-0528-Qwen3-8B Q4_K_XL (~5GB, MIT, Qwen3-8B base, May 2026).\
      \ Chain-of-thought distill of DeepSeek R1-0528 into Qwen3 8B. Matches Qwen3-235B\
      \ performance on AIME 2024 despite 8B parameters. Complements existing\
      \ deepseek-r1:32b — smaller/faster reasoning tier at same TPS floor.\
      \ bench-r1-0528-qwen3-8b target (TASK_MODEL_REFRESH_V8 A-r1-8b).\
      \ supports_tools=false (reasoning model, chain-of-thought format)."
  - id: "hf.co/mradermacher/Josiefied-DeepSeek-R1-0528-Qwen3-8B-abliterated-v1-GGUF:Q4_K_M"
    supports_tools: false
    notes: "R1-0528-Qwen3-8B abliterated Q4_K_M (~5GB, mradermacher GGUF of Goekdeniz-Guelmez Josiefied abliteration). Abliterated chain-of-thought — reasoning without refusals. Candidate for auto-redteam / security reasoning lane. bench-r1-0528-abliterated target (TASK_MODEL_REFRESH_V8_UNCENSORED). supports_tools=false (reasoning model, not tool-trained)."
  - id: "hf.co/ijohn07/harness-1-Q4_K_M-GGUF:Q4_K_M"
    supports_tools: false
    notes: "Harness-1 Q4_K_M (~12GB, gpt-oss-20B fine-tuned search agent, Apache 2.0,\
      \ June 2026). Based on openai/gpt-oss-20b, RL-trained for long-horizon retrieval\
      \ with state-externalizing harness. NOTE: Full harness capability (Chroma vector DB,\
      \ external search state) is not available in Portal 5 pipeline. Standalone inference\
      \ behaves as search-tuned gpt-oss-20B. Bench target for auto-research evaluation.\
      \ bench-harness1 target (TASK_MODEL_REFRESH_V8 A15).\
      \ supports_tools=false (specialized search model, not standard tool-call format)."
