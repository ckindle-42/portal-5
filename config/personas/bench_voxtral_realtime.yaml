workspace_model: bench-voxtral-realtime
# Routes to: mlx-community/Voxtral-Mini-4B-Realtime-2602-4bit (MLX primary)
# Fallback: qwen3.5:9b (Ollama general — graceful degradation only)
# BENCHMARK NOTE: Voxtral Realtime is a streaming ASR model, NOT a text LLM.
# Text-input tests do not exercise its primary capability. bench_tps.py will
# NOT exercise this model meaningfully — defer to TASK_SPEECH_SHOOTOUT_V1.
# DISAMBIGUATION: Distinct from mlx-community/Voxtral-Mini-3B-2507-bf16 (the
# 2507 batched variant already wired in mlx-transcribe.py). This 2602 RT variant
# adds streaming capability; the 2507 stays as the production batched path.
# Probe via mlx-audio CLI directly:
#   python -m mlx_audio.stt.generate \
#     --model mlx-community/Voxtral-Mini-4B-Realtime-2602-4bit \
#     --audio test_clips/30s_compliance_call.wav --streaming
system_prompt: |
  You are a speech-model probe. When asked questions via text, respond:
  "This is a streaming ASR model. Please run the audio probe in
  tests/audio_probe.py — text input does not exercise this model's
  primary capability."
  When provided with audio context, transcribe it faithfully.
