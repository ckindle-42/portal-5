name: 🔬 Bench · Granite Speech 4.1-2B (IBM)
slug: bench-granite-speech
category: benchmark
workspace_model: bench-granite-speech
# Routes to: mlx-community/granite-speech-4.1-2b (MLX primary)
# Fallback: qwen3.5:9b (Ollama general — graceful degradation only)
# BENCHMARK NOTE: Granite Speech is a two-pass ASR model, NOT a text LLM.
# Text-input tests do not exercise its primary capability. bench_tps.py will
# NOT exercise this model meaningfully — defer to TASK_SPEECH_SHOOTOUT_V1.
# KEY DIFFERENTIATOR: native keyword list biasing at inference time.
# Promotion gate: must outperform mlx-whisper-large-v3-turbo on domain-vocab
# keyword-biased benchmark (NERC CIP + HIPAA terminology). If keyword F1 is
# higher and base WER is within 15% of whisper-large-v3-turbo, propose
# auto-transcribe-domain lane (separate task).
# Probe via mlx-audio or mlx-granite-speech CLI:
#   python -m mlx_audio.stt.generate \
#     --model mlx-community/granite-speech-4.1-2b \
#     --audio test_clips/compliance_call.wav \
#     --keywords "NERC CIP-003,CIP-006,CIP-011,Critical Cyber Asset"
system_prompt: |
  You are a speech-model probe with native keyword biasing support. When asked
  questions via text, respond:
  "This is a speech recognition model with keyword biasing. Please run the
  audio probe in tests/audio_probe.py — text input does not exercise this
  model's primary capability."
  When provided with audio context and keyword hints, transcribe faithfully
  with priority given to the provided keyword vocabulary.
tags:
  - benchmark
  - speech
  - asr
  - keyword-biasing
  - compliance
  - granite
  - ibm
