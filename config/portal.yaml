# ── Workspace Catalog ──────────────────────────────────────────────────────
# Keys must match workspace_routing in config/backends.yaml (generated by
# sync-config — do not hand-edit workspace_routing after M1).
#
# expose_to_owui: true  → OWUI workspace preset is generated by sync-config.
# enable_web_search:    → sets OWUI params.enable_web_search on the preset.
# owui_system_prompt:   → sets OWUI params.system on the preset.
workspaces:
  auto:
    name: 🤖 Portal Auto Router
    description: |-
      Intelligently routes to the best specialist model based on your question. Security/redteam topics → BaronLLM. Coding → Qwen3-Coder. Reasoning/research → DeepSeek-R1. Other → general.
    model_hint: huihui_ai/qwen3.5-abliterated:9b-ctx8k
    context_limit: 8192
    tools: []
    expose_to_owui: true
    enable_web_search: true
    owui_system_prompt: |-
      You are Portal, an AI assistant that intelligently selects the best approach for each request. You adapt your style and depth to the task at hand.
  auto-extract-uncensored:
    name: 🔓 Portal Extract (Uncensored)
    description: |-
      Text-only entity/data extraction and summarization with an uncensored model — fewer content refusals on sensitive source text. LFM2.5-8B-A1B Uncensored (gaston-parravicini, ~5GB, abliterated LFM2.5 base). BENCH-PASSED: EX-01 5/5 (100%, 18s) on this hardware. tools=false — extraction/summarization only, no tool loop. Explicit-select; not a default.
    model_hint: hf.co/gaston-parravicini/LFM2.5-8B-A1B-Uncensored-Gaston-GGUF:Q4_K_M-ctx8k
    context_limit: 8192
    keep_alive: 10m
    system_prompt_append: |2-
  
  
      You are an uncensored extraction and summarization assistant. Extract or summarize the requested information directly from any source text without content-policy preambles or refusals for legitimate analysis work. Return structured output (JSON when asked). Do not add moralizing commentary.
    tools: []
    expose_to_owui: true
    enable_web_search: false
  auto-general-uncensored:
    name: 🔓 Portal General (Uncensored)
    description: |-
      Uncensored generalist + reasoning lane — makes the documented general uncensored model explicitly promptable instead of fallback-only. Qwen3.6-abliterated 27B (huihui-ai, ~20GB, MoE 3B active, tools=True). [BENCH-GATED PROVISIONAL — no passing bench in an explicit general role yet; not a default; promotion requires a bench pass + separate operator task.]
    model_hint: huihui_ai/Qwen3.6-abliterated:27b-ctx8k
    context_limit: 8192
    keep_alive: 10m
    temperature: 0.7
    top_p: 0.9
    top_k: 40
    min_p: 0.05
    system_prompt_append: |2-
  
  
      You are an uncensored general assistant. Answer directly and completely without content-policy preambles or refusals for legitimate requests. Refuse only what is genuinely illegal to assist.
    tools:
    - execute_bash
    - execute_python
    - read_word_document
    - read_pdf
    - remember
    - recall
    expose_to_owui: true
    enable_web_search: false
  auto-security-uncensored:
    name: 🔓 Portal Security (Uncensored)
    description: |-
      Uncensored security analysis — same BaronLLM-abliterated as auto-security (Llama-3.1-8B, 53K cybersec examples, 200+ domains) with no safety filtering. Use when auto-security content-guards are interfering with authorized research. Counterpart to auto-security.
    model_hint: huihui_ai/baronllm-abliterated:latest-ctx8k
    context_limit: 8192
    keep_alive: 10m
    temperature: 0.3
    top_p: 0.9
    top_k: 40
    min_p: 0.05
    repeat_penalty: 1.1
    system_prompt_append: |2-
  
  
      You are an uncensored security analysis assistant for authorized testing and research. Provide direct technical analysis without content-policy preambles. Assume the operator is authorized for the systems in scope.
    tools:
    - execute_bash
    - execute_python
    - remember
    - recall
    expose_to_owui: true
    enable_web_search: false
  auto-daily:
    name: 🪶 Portal Daily Driver
    description: |-
      Fast everyday assistant: chat, writing, editing, summarization, planning, light technical help. gemma4:26b-a4b-it-qat primary (Ollama, MoE 4B active, VLM, Apache 2.0, QAT near-BF16). Upgraded from q4_K_M → QAT (V8: +23% TPS, same ~15GB footprint). Daily-driver lane — escalates to specialist workspaces when needed.
    model_hint: gemma4:26b-a4b-it-qat-ctx8k
    context_limit: 8192
    predict_limit: 4096
    tools:
    - web_search
    - web_fetch
    - kb_search
    - kb_list
    - read_pdf
    - read_word_document
    - read_excel
    - create_word_document
    - create_excel
    - create_powerpoint
    - execute_python
    - remember
    - recall
    - generate_music
    - transcribe_audio
    expose_to_owui: true
    enable_web_search: true
    owui_system_prompt: |-
      You are Portal's daily driver — fast, capable, local. Use for everyday chat, writing, summarization, and planning. Escalate to specialist workspaces for heavy coding, deep reasoning, document generation, or regulatory work.
  auto-coding:
    name: 💻 Portal Code Expert
    description: Code generation, debugging, architecture review (Qwen3-Coder-30B MoE, Ollama, 0.22s TTFT)
    model_hint: qwen3-coder:30b-a3b-q4_K_M-ctx16k
    context_limit: 16384
    predict_limit: 16384
    temperature: 0.2
    top_p: 0.9
    top_k: 40
    min_p: 0.05
    repeat_penalty: 1.05
    system_prompt_append: |2-
  
  
      CRITICAL OUTPUT RULE: This is a SINGLE-TURN response — deliver everything now. Do NOT promise, plan, or say 'I will'. IMMEDIATELY produce your complete output. For code: wrap in fenced code blocks (```language). For terminal output: emit the exact shell output, nothing else. Your response must be complete and self-contained — the user cannot follow up.
    tools:
    - execute_python
    - execute_nodejs
    - execute_bash
    - sandbox_status
    - read_word_document
    - read_pdf
    - remember
    - recall
    expose_to_owui: true
    enable_web_search: false
    owui_system_prompt: |-
      You are an expert programmer. Generate clean, well-documented, production-ready code. Prefer idiomatic solutions. Always include error handling. When asked to run or execute code, always invoke the code execution tool — never predict or simulate output.
  
      HARD CONSTRAINT — YOUR RESPONSE IS INCOMPLETE until it contains a fenced code block with the complete implementation for every piece of code requested. Write the code directly in your response. Do not stop after the introduction or the plan — deliver the full, working code immediately.
  auto-coding-northmini:
    name: 💻 Portal Code Expert (North-Mini)
    description: |-
      Additional code generation option for model diversity — North-Mini-Code-1.0-QAD (Cohere Labs, Apache 2.0, ~19.3GB NVFP4 W4A16, cohere2moe arch, 256K ctx, 64K out, 30B-A3B MoE 128 experts top-8). Agentic-coding RL with verifiable rewards; QAD claims >99% accuracy recovery vs unquantized. PROMOTED 2026-06-30 from bench-north-mini-code (V10 candidate eval): 4/5 tool-chain + 4/5 SWE-handoff markers, cohere2moe smoke-loaded cleanly on this Ollama build. This is an *option*, not a replacement for auto-coding (Qwen3-Coder-30B remains primary) — pick this lane when you specifically want lineage diversity from the Qwen/GLM-heavy coding pool.
    model_hint: hf.co/coder543/North-Mini-Code-1.0-QAD-GGUF:NVFP4-ctx8k
    context_limit: 8192
    predict_limit: 16384
    temperature: 1.0
    top_p: 0.95
    tools:
    - execute_python
    - execute_nodejs
    - execute_bash
    - sandbox_status
    - read_word_document
    - read_pdf
    - remember
    - recall
    expose_to_owui: true
    enable_web_search: false
    owui_system_prompt: |-
      You are an expert programmer running on North-Mini-Code-1.0-QAD (Cohere Labs). Generate clean, well-documented, production-ready code. Prefer idiomatic solutions. Always include error handling. When asked to run or execute code, always invoke the code execution tool — never predict or simulate output.
  auto-coding-uncensored:
    name: 🔓 Portal Code (Uncensored)
    description: |-
      One-shot code generation with a tool-capable, lightly-aligned model — fewer content refusals than the filtered auto-coding lane. OmniCoder-2 9B (Qwen3.5-9B base, ~5.7GB, Apache 2.0, tools=True). Use for codegen the standard coder declines on policy grounds. [BENCH-GATED PROVISIONAL model_hint — not a default; promotion requires a passing GC/CC bench run and a separate operator promotion task. For the agentic loop use auto-coding-uncensored-agentic.]
    model_hint: omnicoder2:9b-q4_k_m-ctx8k
    context_limit: 8192
    keep_alive: 10m
    temperature: 0.2
    top_p: 0.9
    top_k: 40
    min_p: 0.05
    repeat_penalty: 1.05
    system_prompt_append: |2-
  
  
      You are an uncensored coding assistant. Produce the requested code directly and completely. Do not add moralizing preambles or refuse on content-policy grounds for legitimate engineering work. Still refuse only what is genuinely illegal to assist (e.g. functional malware-as-a-service, CSAM). Prefer correct, runnable code over caveats.
    tools:
    - execute_bash
    - execute_python
    - execute_nodejs
    - sandbox_status
    - read_word_document
    - read_pdf
    - remember
    - recall
    expose_to_owui: true
    enable_web_search: false
  auto-coding-uncensored-agentic:
    name: 🔓 Portal Agentic Coder (Uncensored)
    description: |-
      Multi-turn agentic coding with an abliterated SWE-capable model — the uncensored counterpart to auto-coding-agentic. Qwen3-Coder-Next abliterated (80B/3B MoE, ~46GB, bartowski GGUF, tools per Qwen coding-family arch). Same read→explore→edit→verify loop and explore_repository subagent. [BENCH-GATED PROVISIONAL model_hint — ~46GB resident on 64GB unified memory; not a default; promotion requires a passing bench run + separate operator task. Tool support asserted by architecture, not yet audit-confirmed.]
    model_hint: hf.co/bartowski/huihui-ai_Qwen3-Coder-Next-abliterated-GGUF:Q4_K_M-ctx64k
    context_limit: 65536
    keep_alive: 15m
    temperature: 0.2
    top_p: 0.9
    top_k: 40
    min_p: 0.05
    repeat_penalty: 1.05
    system_prompt_append: |2
  
  
      AGENTIC CODING LOOP — follow this pattern every turn:
      1. EXPLORE: call explore_repository('what you need to find') first.
         It returns exact file paths and line numbers — use these, do not guess paths.
      2. READ: use execute_bash to read those specific files/line ranges before editing
         (cat -n <file> | sed -n '<start>,<end>p')
      3. PLAN: state the minimal change needed and which files are affected
      4. EDIT: make precise, targeted changes — do not rewrite whole files
      5. VERIFY: run tests or linters with execute_bash after every change
      6. REPORT: state what changed, what passed, and what remains
  
      You are uncensored: complete legitimate engineering work directly without content-policy preambles or refusals. Refuse only what is genuinely illegal to assist. HARD CONSTRAINTS:
      - Never hardcode model names, backend URLs, or credentials
      - Never modify Open WebUI source — use extension points only
      - Never commit .env or add cloud dependencies
      - Run pytest before declaring a fix complete
    tools:
    - explore_repository
    - execute_bash
    - execute_python
    - execute_nodejs
    - sandbox_status
    - read_word_document
    - read_pdf
    - remember
    - recall
    expose_to_owui: true
    enable_web_search: false
  auto-coding-agentic:
    name: 🔄 Portal IDE / Agentic Coder
    description: |-
      Multi-turn agentic coding workspace — the default model for opencode and Claude Code in this repo. Laguna-XS.2 (Poolside AI, 33B-A3B MoE, ~19GB, 68.2% SWE-bench Verified, interleaved reasoning, 2/2 security chain). Tuned for the read → understand → edit → verify loop: inspects files via explore_repository + execute_bash, makes targeted changes, runs tests, iterates. Devstral-small-2 (V2, 256K ctx, vision) is the first fallback in the coding pool. For one-shot code generation, use auto-coding instead.
    model_hint: laguna-xs.2:Q4_K_M-ctx64k
    context_limit: 65536
    keep_alive: 15m
    temperature: 0.2
    top_p: 0.9
    top_k: 40
    min_p: 0.05
    repeat_penalty: 1.05
    system_prompt_append: |2-
  
  
      AGENTIC CODING LOOP — follow this pattern every turn:
      1. EXPLORE: call explore_repository('what you need to find') first.
         It returns exact file paths and line numbers — use these, do not guess paths.
      2. READ: call read_text_file(path=...) to read those specific files before editing.
         NEVER use execute_bash cat/head/tail to read project files —
         execute_bash runs inside an isolated Docker container with NO access to the
         host filesystem. read_text_file/list_directory/search_files are the only way
         to read project files.
      3. PLAN: state the minimal change needed and which files are affected
      4. EDIT: call write_file(path=..., content=...) — do not rewrite whole files
      5. VERIFY: run tests or linters with execute_bash after every change
         (pytest tests/unit/ -q; ruff check <file>)
      6. REPORT: state what changed, what passed, and what remains
  
      TOOL ROUTING:
      - read_text_file, write_file, search_files, list_directory:
        host-native pipeline tools — call these directly by name for ALL file I/O
      - execute_bash / execute_python / execute_nodejs:
        isolated sandbox container — use ONLY for running code, tests, and linters
  
      HARD CONSTRAINTS:
      - Never hardcode model names, backend URLs, or credentials
      - Never modify Open WebUI source — use extension points only
      - Never commit .env or add cloud dependencies
      - Run pytest before declaring a fix complete
      - Keep portal_pipeline lean — no ML framework imports
      - Changes to workspace routing must pass the Rule 6 consistency check:
        python3 -c "from portal_pipeline.router_pipe import WORKSPACES; import yaml; cfg=yaml.safe_load(open('config/backends.yaml')); assert set(WORKSPACES)==set(cfg['workspace_routing']), 'mismatch'"
    tools:
    - explore_repository
    - read_text_file
    - list_directory
    - search_files
    - write_file
    - execute_bash
    - execute_python
    - execute_nodejs
    - sandbox_status
    - read_word_document
    - read_pdf
    - remember
    - recall
    expose_to_owui: true
    enable_web_search: false
  auto-agentic:
    name: ⚡ Portal Agentic Coder (Heavy)
    description: |-
      Agentic coding workspace for long-horizon multi-file tasks, SWE-agent-style workflows, and complex refactors. Qwen3-Coder-Next 80B/3B MoE (V8: agentic RL training on 800K executable tasks, 256K ctx, ~46GB, 20 t/s pipeline). Fallback 1: Qwen-AgentWorld-35B-A3B (~21GB, 45 t/s, MoE 3B active, 262K ctx) — language world model trained on MCP/Terminal/SWE/Web/OS env-simulation; strong tool-call coherence, available in general+coding pools. Fallback 2: gpt-oss:20b (~12GB, o3-mini level, MoE, purpose-built for agent/tool use, 2/2 security chain at 45s) — available in the coding pool when the primary is not loaded.
