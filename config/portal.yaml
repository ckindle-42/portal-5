  auto-compliance:
    name: ⚖️  Portal Compliance Analyst
    description: |-
      Multi-framework compliance analysis: NERC CIP, HIPAA, GDPR, SOC 2, PCI-DSS, NIST CSF/800-53, ISO 27001, FedRAMP, NIS2, CMMC, FFIEC, and state privacy laws (CCPA/CPRA, Texas TDPSA, Connecticut CTDPA, etc.). Gap analysis, policy drafting, evidence review, cross-framework control mapping, audit prep.
