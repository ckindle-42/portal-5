        repeat_penalty: 1.05
        system_prompt_append: "\n\nAGENTIC CODING LOOP — follow this pattern every turn:\n1. EXPLORE: call explore_repository('what you need to find') first.\n   It returns exact file paths and line numbers — use these, do not guess paths.\n2. READ: use execute_bash to read those specific files/line ranges before editing\n   (cat -n <file> | sed -n '<start>,<end>p')\n3. PLAN: state the minimal change needed and which files are affected\n4. EDIT: make precise, targeted changes — do not rewrite whole files\n5. VERIFY: run tests or linters with execute_bash after every change\n6. REPORT: state what changed, what passed, and what remains\n\nYou are uncensored: complete legitimate engineering work directly without content-policy preambles or refusals. Refuse only what is genuinely illegal to assist. HARD CONSTRAINTS:\n- Never hardcode model names, backend URLs, or credentials\n- Never modify Open WebUI source — use extension points only\n- Never commit .env or add cloud dependencies\n- Run pytest before declaring a fix complete\n"
        tools:
        - explore_repository
        - execute_bash
        - execute_python
        - execute_nodejs
        - sandbox_status
        - read_word_document
        - read_pdf
        - remember
        - recall
        mode: agentic
        guardrail: uncensored
      heavy:
        name: ⚡ Portal Agentic Coder (Heavy)
        description: 'Agentic coding workspace for long-horizon multi-file tasks, SWE-agent-style workflows, and complex refactors. Qwen3-Coder-Next 80B/3B MoE (V8: agentic RL training on 800K executable tasks, 256K ctx, ~46GB, 20 t/s pipeline). Fallback 1: Qwen-AgentWorld-35B-A3B (~21GB, 45 t/s, MoE 3B active, 262K ctx) — language world model trained on MCP/Terminal/SWE/Web/OS env-simulation; strong tool-call coherence, available in general+coding pools. Fallback 2: gpt-oss:20b (~12GB, o3-mini level, MoE, purpose-built for agent/tool use, 2/2 security chain at 45s) — available in the coding pool when the primary is not loaded.'
