# ── Workspace Catalog ──────────────────────────────────────────────────────
# Keys must match workspace_routing in config/backends.yaml (generated by
# sync-config — do not hand-edit workspace_routing after M1).
#
# expose_to_owui: true  → OWUI workspace preset is generated by sync-config.
# enable_web_search:    → sets OWUI params.enable_web_search on the preset.
# owui_system_prompt:   → sets OWUI params.system on the preset.
workspaces:
  auto:
    module: general
    name: 🤖 Portal Auto Router
    description: |-
      Intelligently routes to the best specialist model based on your question. Security/redteam topics → BaronLLM. Coding → Qwen3-Coder. Reasoning/research → DeepSeek-R1. Other → general.
    model_hint: huihui_ai/qwen3.5-abliterated:9b-ctx8k
    context_limit: 8192
    tools: []
    expose_to_owui: true
    enable_web_search: true
    owui_system_prompt: |-
      You are Portal, an AI assistant that intelligently selects the best approach for each request. You adapt your style and depth to the task at hand.
  auto-extract-uncensored:
    module: documents
    name: 🔓 Portal Extract (Uncensored)
    description: |-
      Text-only entity/data extraction and summarization with an uncensored model — fewer content refusals on sensitive source text. LFM2.5-8B-A1B Uncensored (gaston-parravicini, ~5GB, abliterated LFM2.5 base). BENCH-PASSED: EX-01 5/5 (100%, 18s) on this hardware. tools=false — extraction/summarization only, no tool loop. Explicit-select; not a default.
    model_hint: hf.co/gaston-parravicini/LFM2.5-8B-A1B-Uncensored-Gaston-GGUF:Q4_K_M-ctx8k
    context_limit: 8192
    keep_alive: 10m
    system_prompt_append: |2-
  
  
      You are an uncensored extraction and summarization assistant. Extract or summarize the requested information directly from any source text without content-policy preambles or refusals for legitimate analysis work. Return structured output (JSON when asked). Do not add moralizing commentary.
    tools: []
    expose_to_owui: true
    enable_web_search: false
  auto-general-uncensored:
    module: general
    name: 🔓 Portal General (Uncensored)
    description: |-
      Uncensored generalist + reasoning lane — makes the documented general uncensored model explicitly promptable instead of fallback-only. Qwen3.6-abliterated 27B (huihui-ai, ~20GB, MoE 3B active, tools=True). [BENCH-GATED PROVISIONAL — no passing bench in an explicit general role yet; not a default; promotion requires a bench pass + separate operator task.]
    model_hint: huihui_ai/Qwen3.6-abliterated:27b-ctx8k
    context_limit: 8192
    keep_alive: 10m
    temperature: 0.7
    top_p: 0.9
    top_k: 40
    min_p: 0.05
    system_prompt_append: |2-
  
  
      You are an uncensored general assistant. Answer directly and completely without content-policy preambles or refusals for legitimate requests. Refuse only what is genuinely illegal to assist.
    tools:
    - execute_bash
    - execute_python
    - read_word_document
    - read_pdf
    - remember
    - recall
    expose_to_owui: true
    enable_web_search: false
  auto-daily:
    module: general
    name: 🪶 Portal Daily Driver
    description: |-
      Fast everyday assistant: chat, writing, editing, summarization, planning, light technical help. gemma4:26b-a4b-it-qat primary (Ollama, MoE 4B active, VLM, Apache 2.0, QAT near-BF16). Upgraded from q4_K_M → QAT (V8: +23% TPS, same ~15GB footprint). Daily-driver lane — escalates to specialist workspaces when needed.
    model_hint: gemma4:26b-a4b-it-qat-ctx8k
    inject_memory: true
    auto_rag: true
    memory_writeback: true
    context_limit: 8192
    predict_limit: 4096
    tools:
    - web_search
    - web_fetch
    - kb_search
    - kb_list
    - read_pdf
    - read_word_document
    - read_excel
    - create_word_document
    - create_excel
    - create_powerpoint
    - execute_python
    - remember
    - recall
    - generate_music
    - transcribe_audio
    expose_to_owui: true
    enable_web_search: true
    owui_system_prompt: |-
      You are Portal's daily driver — fast, capable, local. Use for everyday chat, writing, summarization, and planning. Escalate to specialist workspaces for heavy coding, deep reasoning, document generation, or regulatory work.
  auto-coding:
    module: coding
    name: 💻 Portal Code Expert
    description: Code generation, debugging, architecture review (Qwen3-Coder-30B MoE, Ollama, 0.22s TTFT)
    model_hint: qwen3-coder:30b-a3b-q4_K_M-ctx16k
    context_limit: 16384
    predict_limit: 16384
    temperature: 0.2
    top_p: 0.9
    top_k: 40
    min_p: 0.05
    repeat_penalty: 1.05
    system_prompt_append: "\n\nCRITICAL OUTPUT RULE: This is a SINGLE-TURN response — deliver everything now. Do NOT promise, plan, or say 'I will'. IMMEDIATELY produce your complete output. For code: wrap in fenced code blocks (```language). For terminal output: emit the exact shell output, nothing else. Your response must be complete and self-contained — the user cannot follow up."
    tools:
    - execute_python
    - execute_nodejs
    - execute_bash
    - sandbox_status
    - read_word_document
    - read_pdf
    - remember
    - recall
    expose_to_owui: true
    enable_web_search: false
    owui_system_prompt: "You are an expert programmer. Generate clean, well-documented, production-ready code. Prefer idiomatic solutions. Always include error handling. When asked to run or execute code, always invoke the code execution tool — never predict or simulate output.\n\nHARD CONSTRAINT — YOUR RESPONSE IS INCOMPLETE until it contains a fenced code block with the complete implementation for every piece of code requested. Write the code directly in your response. Do not stop after the introduction or the plan — deliver the full, working code immediately."
    variants:
      laguna:
        name: 🔄 Portal IDE / Agentic Coder
        description: 'Multi-turn agentic coding workspace — the default model for opencode and Claude Code in this repo. Laguna-XS.2 (Poolside AI, 33B-A3B MoE, ~19GB, 68.2% SWE-bench Verified, interleaved reasoning, 2/2 security chain). Tuned for the read → understand → edit → verify loop: inspects files via explore_repository + execute_bash, makes targeted changes, runs tests, iterates. Devstral-small-2 (V2, 256K ctx, vision) is the first fallback in the coding pool. For one-shot code generation, use auto-coding instead.'
        model_hint: laguna-xs.2:Q4_K_M-ctx64k
        context_limit: 65536
        keep_alive: 15m
        temperature: 0.2
        top_p: 0.9
        top_k: 40
        min_p: 0.05
        repeat_penalty: 1.05
        system_prompt_append: "\n\nAGENTIC CODING LOOP — follow this pattern every turn:\n1. EXPLORE: call explore_repository('what you need to find') first.\n   It returns exact file paths and line numbers — use these, do not guess paths.\n2. READ: call read_text_file(path=...) to read those specific files before editing.\n   NEVER use execute_bash cat/head/tail to read project files —\n   execute_bash runs inside an isolated Docker container with NO access to the\n   host filesystem. read_text_file/list_directory/search_files are the only way\n   to read project files.\n3. PLAN: state the minimal change needed and which files are affected\n4. EDIT: call write_file(path=..., content=...) — do not rewrite whole files\n5. VERIFY: run tests or linters with execute_bash after every change\n   (pytest tests/unit/ -q; ruff check <file>)\n6. REPORT: state what changed, what passed, and what remains\n\nTOOL ROUTING:\n- read_text_file, write_file, search_files, list_directory:\n  host-native pipeline tools — call these directly by name for ALL file I/O\n- execute_bash / execute_python / execute_nodejs:\n  isolated sandbox container — use ONLY for running code, tests, and linters\n\nHARD CONSTRAINTS:\n- Never hardcode model names, backend URLs, or credentials\n- Never modify Open WebUI source — use extension points only\n- Never commit .env or add cloud dependencies\n- Run pytest before declaring a fix complete\n- Keep portal.platform.inference lean — no ML framework imports\n- Changes to workspace routing must pass the Rule 6 consistency check:\n  python3 -c \"from portal.platform.inference.router_pipe import WORKSPACES; import yaml; cfg=yaml.safe_load(open('config/backends.yaml')); assert set(WORKSPACES)==set(cfg['workspace_routing']), 'mismatch'\""
        tools:
        - explore_repository
        - read_text_file
        - list_directory
        - search_files
        - write_file
        - execute_bash
        - execute_python
        - execute_nodejs
        - sandbox_status
        - read_word_document
        - read_pdf
        - remember
        - recall
        mode: agentic
        guardrail: default
      northmini:
        name: 💻 Portal Code Expert (North-Mini)
        description: 'Additional code generation option for model diversity — North-Mini-Code-1.0-QAD (Cohere Labs, Apache 2.0, ~19.3GB NVFP4 W4A16, cohere2moe arch, 256K ctx, 64K out, 30B-A3B MoE 128 experts top-8). Agentic-coding RL with verifiable rewards; QAD claims >99% accuracy recovery vs unquantized. PROMOTED 2026-06-30 from bench-north-mini-code (V10 candidate eval): 4/5 tool-chain + 4/5 SWE-handoff markers, cohere2moe smoke-loaded cleanly on this Ollama build. This is an *option*, not a replacement for auto-coding (Qwen3-Coder-30B remains primary) — pick this lane when you specifically want lineage diversity from the Qwen/GLM-heavy coding pool.'
        model_hint: hf.co/coder543/North-Mini-Code-1.0-QAD-GGUF:NVFP4-ctx8k
        context_limit: 8192
        predict_limit: 16384
        temperature: 1.0
        top_p: 0.95
        tools:
        - execute_python
        - execute_nodejs
        - execute_bash
        - sandbox_status
        - read_word_document
        - read_pdf
        - remember
        - recall
        mode: single
        guardrail: default
      uncensored:
        name: 🔓 Portal Code (Uncensored)
        description: One-shot code generation with a tool-capable, lightly-aligned model — fewer content refusals than the filtered auto-coding lane. OmniCoder-2 9B (Qwen3.5-9B base, ~5.7GB, Apache 2.0, tools=True). Use for codegen the standard coder declines on policy grounds. [BENCH-GATED PROVISIONAL model_hint — not a default; promotion requires a passing GC/CC bench run and a separate operator promotion task. For the agentic loop use the uncensored-agentic variant (auto-coding?variant=uncensored-agentic).]
        model_hint: omnicoder2:9b-q4_k_m-ctx8k
        context_limit: 8192
        keep_alive: 10m
        temperature: 0.2
        top_p: 0.9
        top_k: 40
        min_p: 0.05
        repeat_penalty: 1.05
        system_prompt_append: "\n\nYou are an uncensored coding assistant. Produce the requested code directly and completely. Do not add moralizing preambles or refuse on content-policy grounds for legitimate engineering work. Still refuse only what is genuinely illegal to assist (e.g. functional malware-as-a-service, CSAM). Prefer correct, runnable code over caveats."
        tools:
        - execute_bash
        - execute_python
        - execute_nodejs
        - sandbox_status
