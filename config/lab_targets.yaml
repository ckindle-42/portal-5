  cve: CVE-2017-12615
  technique: RCE
  ground_truth:
    oracle: rce_shell
    success_indicators: ["JSP uploaded", "cmd executed"]
  hardened_twin:
    method: image_tag
    value: "tomcat:9.0.2"
  preexisting: true
- id: vulhub-redis-rce
