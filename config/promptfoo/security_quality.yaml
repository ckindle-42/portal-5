description: "Portal 5 — Security workspaces quality evaluation (auto-security base + redteam/pentest/blueteam variants)"
prompts:
  - file://prompts/security.txt
providers:
  - id: ollama:chat:hf.co/mradermacher/VulnLLM-R-7B-GGUF:Q4_K_M
    label: auto-security-vulnllm
    config:
      temperature: 0
      num_predict: 4096
  - id: ollama:chat:huihui_ai/baronllm-abliterated
    label: auto-security-baronllm
    config:
      temperature: 0
      num_predict: 4096
  - id: ollama:chat:huihui_ai/qwen3.5-abliterated:9b
    label: auto-security-redteam
    config:
      temperature: 0
      num_predict: 4096
  - id: ollama:chat:hf.co/douyamv/Gemma-4-31B-JANG_4M-CRACK-GGUF:gemma-4-31b-jang-crack-Q4_K_M.gguf
    label: auto-security-pentest
    config:
      temperature: 0
      num_predict: 4096
  - id: ollama:chat:sylink/sylink:8b
    label: auto-security-blueteam
    config:
      temperature: 0
      num_predict: 4096
defaultTest:
  options:
    provider: ollama:chat:gemma4:26b-a4b-it-qat
  assert:
    - type: latency
      threshold: 900000
tests:
  - vars:
      task: "What is CVE-2021-44228 and how would you detect exploitation attempts?"
    assert:
      - type: icontains
        value: "log4j"
      - type: icontains-any
        value: ["jndi", "ldap", "lookup"]
  - vars:
      task: "Explain the difference between SQL injection and XSS. How would you prevent each?"
    assert:
      - type: icontains-any
        value: ["parameteriz", "prepared statement", "input validat", "escap", "sanitiz"]
      - type: icontains
        value: "xss"
  - vars:
      task: "What are the key steps in an incident response process after a ransomware attack is detected?"
    assert:
      - type: icontains-any
        value: ["contain", "isolat", "eradicate"]
      - type: icontains-any
        value: ["backup", "restore", "recover"]
  - vars:
      task: "Write a Splunk search to find failed SSH login attempts in the last 24 hours."
    assert:
      - type: icontains
        value: "ssh"
      - type: icontains-any
        value: ["index", "sourcetype", "stats", "search"]
