- name: 🤖 Portal Auto Router
  displayName: 🤖 Portal Auto Router
  description: Intelligently routes to the best specialist model based on your question.
    Security/redteam topics → BaronLLM. Coding → Qwen3-Coder. Reasoning/research →
    DeepSeek-R1. Other → general.
  endpoints:
  - type: openai
    url: http://portal-pipeline:9099/v1
    authorization: 'Bearer '
    apiKey: ''
    model: auto
  parameters:
    temperature: 0.7
    max_new_tokens: 4096
    system_prompt: Intelligently routes to the best specialist model based on your
      question. Security/redteam topics → BaronLLM. Coding → Qwen3-Coder. Reasoning/research
      → DeepSeek-R1. Other → general.
- name: 🪶 Portal Daily Driver
  displayName: 🪶 Portal Daily Driver
  description: 'Fast everyday assistant: chat, writing, editing, summarization, planning,
    light technical help. MLX gemma-4-26b-a4b primary (57.8 TPS, MoE 4B active, VLM,
    Apache 2.0); Ollama dolphin-llama3:8b fallback (non-thinking). Daily-driver lane
    — escalates to specialist workspaces (auto-coding, auto-reasoning, etc.) when
    the persona detects out-of-lane requests. No reasoning chain, no <think> emission
    — predict_limit capped and thinking mode explicitly disabled to keep responses
    snappy.'
  endpoints:
  - type: openai
    url: http://portal-pipeline:9099/v1
    authorization: 'Bearer '
    apiKey: ''
    model: auto-daily
  parameters:
    temperature: 0.7
    max_new_tokens: 4096
    system_prompt: 'Fast everyday assistant: chat, writing, editing, summarization,
      planning, light technical help. MLX gemma-4-26b-a4b primary (57.8 TPS, MoE 4B
      active, VLM, Apache 2.0); Ollama dolphin-llama3:8b fallback (non-thinking).
      Daily-driver lane — escalates to specialist workspaces (auto-coding, auto-reasoning,
      etc.) when the persona detects out-of-lane requests. No reasoning chain, no
      <think> emission — predict_limit capped and thinking mode explicitly disabled
      to keep responses snappy.'
